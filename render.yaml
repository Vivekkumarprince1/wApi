envVarGroups:
  - name: wapi-shared-auth
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: INTERNAL_SERVICE_SECRET
        generateValue: true

services:
  - type: web
    name: wapi-api-gateway
    runtime: docker
    plan: free
    dockerContext: .
    dockerfilePath: services/api-gateway/Dockerfile
    healthCheckPath: /live
    envVars:
      - fromGroup: wapi-shared-auth
      - key: ALLOWED_ORIGINS
        value: https://connectsphare-backup.vercel.app,http://localhost:3000,http://localhost:3001,http://localhost:3002
      - key: CORE_SERVER_URL
        value: https://wapi-core-server.onrender.com
      - key: AUTOMATION_SERVICE_URL
        value: https://wapi-automation-service.onrender.com
      - key: CAMPAIGN_SERVICE_URL
        value: https://wapi-campaign-service.onrender.com
      - key: BILLING_SERVICE_URL
        value: https://wapi-billing-service.onrender.com

  - type: web
    name: wapi-core-server
    runtime: docker
    plan: free
    dockerContext: .
    dockerfilePath: services/core-server/Dockerfile
    healthCheckPath: /live
    envVars:
      - fromGroup: wapi-shared-auth

  - type: web
    name: wapi-automation-service
    runtime: docker
    plan: free
    dockerContext: .
    dockerfilePath: services/automation-service/Dockerfile
    healthCheckPath: /live
    envVars:
      - fromGroup: wapi-shared-auth

  - type: web
    name: wapi-campaign-service
    runtime: docker
    plan: free
    dockerContext: .
    dockerfilePath: services/campaign-service/Dockerfile
    healthCheckPath: /live
    envVars:
      - fromGroup: wapi-shared-auth

  - type: web
    name: wapi-billing-service
    runtime: docker
    plan: free
    dockerContext: .
    dockerfilePath: services/billing-service/Dockerfile
    healthCheckPath: /live
    envVars:
      - fromGroup: wapi-shared-auth
