services:
  - type: keyvalue
    name: wapi-redis
    plan: starter
    maxmemoryPolicy: noeviction
    ipAllowList: []

  # Public ingress.
  - type: web
    name: wapi-api-gateway
    runtime: node
    plan: starter
    autoDeploy: true
    buildCommand: bash scripts/render-build.sh services/api-gateway
    startCommand: bash scripts/render-start.sh services/api-gateway AUTH_SERVICE_URL=AUTH_SERVICE_HOSTPORT CONTACT_SERVICE_URL=CONTACT_SERVICE_HOSTPORT CHAT_SERVICE_URL=CHAT_SERVICE_HOSTPORT SERVICE_PROVIDER_URL=SERVICE_PROVIDER_HOSTPORT AUTOMATION_SERVICE_URL=AUTOMATION_SERVICE_HOSTPORT BILLING_SERVICE_URL=BILLING_SERVICE_HOSTPORT CAMPAIGN_SERVICE_URL=CAMPAIGN_SERVICE_HOSTPORT WEBSOCKET_URL=WEBSOCKET_HOSTPORT WEBHOOK_INGESTOR_URL=WEBHOOK_INGESTOR_HOSTPORT
    healthCheckPath: /health
    envVars:
      - fromGroup: wapi-production-common
      - key: PORT
        value: 5001
      - key: ALLOWED_ORIGINS
        sync: false
      - key: AUTH_SERVICE_HOSTPORT
        fromService:
          type: pserv
          name: wapi-auth-service
          property: hostport
      - key: CONTACT_SERVICE_HOSTPORT
        fromService:
          type: pserv
          name: wapi-contact-service
          property: hostport
      - key: CHAT_SERVICE_HOSTPORT
        fromService:
          type: pserv
          name: wapi-chat-service
          property: hostport
      - key: SERVICE_PROVIDER_HOSTPORT
        fromService:
          type: pserv
          name: wapi-service-provider
          property: hostport
      - key: AUTOMATION_SERVICE_HOSTPORT
        fromService:
          type: pserv
          name: wapi-automation-service
          property: hostport
      - key: BILLING_SERVICE_HOSTPORT
        fromService:
          type: pserv
          name: wapi-billing-service
          property: hostport
      - key: CAMPAIGN_SERVICE_HOSTPORT
        fromService:
          type: pserv
          name: wapi-campaign-service
          property: hostport
      - key: WEBSOCKET_HOSTPORT
        fromService:
          type: web
          name: wapi-websocket-gateway
          property: hostport
      - key: WEBHOOK_INGESTOR_HOSTPORT
        fromService:
          type: web
          name: wapi-webhook-ingestor
          property: hostport
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: wapi-redis
          property: connectionString

  - type: web
    name: wapi-customer-portal
    runtime: node
    plan: starter
    autoDeploy: true
    buildCommand: bash scripts/render-build.sh apps/customer-portal BACKEND_API_URL=API_GATEWAY_HOSTPORT
    startCommand: bash scripts/render-start.sh apps/customer-portal BACKEND_API_URL=API_GATEWAY_HOSTPORT
    healthCheckPath: /
    envVars:
      - fromGroup: wapi-production-common
      - key: PORT
        value: 3000
      - key: API_GATEWAY_HOSTPORT
        fromService:
          type: web
          name: wapi-api-gateway
          property: hostport
      - key: NEXT_PUBLIC_API_URL
        value: /api
      - key: NEXT_PUBLIC_APP_NAME
        value: wApi
      - key: NEXT_PUBLIC_APP_URL
        sync: false
      - key: NEXT_PUBLIC_ADMIN_PORTAL_URL
        sync: false
      - key: NEXT_PUBLIC_SOCKET_URL
        sync: false
      - key: NEXT_PUBLIC_GOOGLE_CLIENT_ID
        sync: false
      - key: NEXT_PUBLIC_FACEBOOK_APP_ID
        sync: false
      - key: NEXT_PUBLIC_BUSINESS_VERIFICATION_MANDATORY
        value: false

  - type: web
    name: wapi-admin-portal
    runtime: node
    plan: starter
    autoDeploy: true
    buildCommand: bash scripts/render-build.sh apps/admin-portal GATEWAY_URL=API_GATEWAY_HOSTPORT BACKEND_API_URL=API_GATEWAY_HOSTPORT
    startCommand: bash scripts/render-start.sh apps/admin-portal GATEWAY_URL=API_GATEWAY_HOSTPORT BACKEND_API_URL=API_GATEWAY_HOSTPORT
    healthCheckPath: /
    envVars:
      - fromGroup: wapi-production-common
      - key: PORT
        value: 3100
      - key: NEXT_PUBLIC_APP_NAME
        value: wApi Super Admin
      - key: NEXT_PUBLIC_APP_URL
        sync: false
      - key: API_GATEWAY_HOSTPORT
        fromService:
          type: web
          name: wapi-api-gateway
          property: hostport
      - key: CUSTOMER_PORTAL_URL
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_URI_BILLING
        sync: false
      - key: MONGODB_URI_CAMPAIGN
        sync: false
      - key: MONGODB_URI_AUTOMATION
        sync: false
      - key: ADMIN_COOKIE_NAME
        value: admin_token
      - key: ADMIN_SESSION_TTL
        value: 28800
      - key: AUTH_TOKEN_TTL
        value: 7d
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: wapi-redis
          property: connectionString
      - key: GUPSHUP_PARTNER_BASE_URL
        value: https://partner.gupshup.io
      - key: GUPSHUP_PARTNER_EMAIL
        sync: false
      - key: GUPSHUP_PARTNER_PASSWORD
        sync: false

  - type: web
    name: wapi-webhook-ingestor
    runtime: node
    plan: starter
    autoDeploy: true
    buildCommand: bash scripts/render-build.sh services/webhook-ingestor
    startCommand: bash scripts/render-start.sh services/webhook-ingestor
    healthCheckPath: /health
    envVars:
      - fromGroup: wapi-production-common
      - key: PORT
        value: 3013
      - key: MONGO_URI
        sync: false
      - key: WEBHOOK_SECRET
        sync: false
      - key: WEBHOOK_VERIFY_TOKEN
        sync: false
      - key: VERIFY_TOKEN
        sync: false
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: wapi-redis
          property: connectionString

  - type: web
    name: wapi-websocket-gateway
    runtime: node
    plan: starter
    autoDeploy: true
    buildCommand: bash scripts/render-build.sh services/websocket-gateway
    startCommand: bash scripts/render-start.sh services/websocket-gateway
    healthCheckPath: /health
    envVars:
      - fromGroup: wapi-production-common
      - key: PORT
        value: 3009
      - key: MONGO_URI
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: wapi-redis
          property: connectionString

  # Internal microservices. These should be reachable only through the gateway
  # or from other Render services over the private network.
  - type: pserv
    name: wapi-auth-service
    runtime: node
    plan: starter
    autoDeploy: true
    buildCommand: bash scripts/render-build.sh services/auth-service
    startCommand: bash scripts/render-start.sh services/auth-service BSP_SERVICE_URL=SERVICE_PROVIDER_HOSTPORT BILLING_SERVICE_URL=BILLING_SERVICE_HOSTPORT AUTOMATION_SERVICE_URL=AUTOMATION_SERVICE_HOSTPORT CAMPAIGN_SERVICE_URL=CAMPAIGN_SERVICE_HOSTPORT
    healthCheckPath: /health
    envVars:
      - fromGroup: wapi-production-common
      - key: PORT
        value: 3006
      - key: MONGO_URI
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: NEXT_PUBLIC_APP_URL
        sync: false
      - key: SERVICE_PROVIDER_HOSTPORT
        fromService:
          type: pserv
          name: wapi-service-provider
          property: hostport
      - key: BILLING_SERVICE_HOSTPORT
        fromService:
          type: pserv
          name: wapi-billing-service
          property: hostport
      - key: AUTOMATION_SERVICE_HOSTPORT
        fromService:
          type: pserv
          name: wapi-automation-service
          property: hostport
      - key: CAMPAIGN_SERVICE_HOSTPORT
        fromService:
          type: pserv
          name: wapi-campaign-service
          property: hostport
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: wapi-redis
          property: connectionString

  - type: pserv
    name: wapi-contact-service
    runtime: node
    plan: starter
    autoDeploy: true
    buildCommand: bash scripts/render-build.sh services/contact-service
    startCommand: bash scripts/render-start.sh services/contact-service CAMPAIGN_SERVICE_URL=CAMPAIGN_SERVICE_HOSTPORT AUTOMATION_SERVICE_URL=AUTOMATION_SERVICE_HOSTPORT
    healthCheckPath: /health
    envVars:
      - fromGroup: wapi-production-common
      - key: PORT
        value: 3007
      - key: MONGO_URI
        sync: false
      - key: CAMPAIGN_SERVICE_HOSTPORT
        fromService:
          type: pserv
          name: wapi-campaign-service
          property: hostport
      - key: AUTOMATION_SERVICE_HOSTPORT
        fromService:
          type: pserv
          name: wapi-automation-service
          property: hostport
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: wapi-redis
          property: connectionString

  - type: pserv
    name: wapi-chat-service
    runtime: node
    plan: starter
    autoDeploy: true
    buildCommand: bash scripts/render-build.sh services/chat-service
    startCommand: bash scripts/render-start.sh services/chat-service CONTACT_SERVICE_URL=CONTACT_SERVICE_HOSTPORT AUTOMATION_SERVICE_URL=AUTOMATION_SERVICE_HOSTPORT BILLING_SERVICE_URL=BILLING_SERVICE_HOSTPORT BSP_SERVICE_URL=SERVICE_PROVIDER_HOSTPORT
    healthCheckPath: /health
    envVars:
      - fromGroup: wapi-production-common
      - key: PORT
        value: 3008
      - key: MONGO_URI
        sync: false
      - key: CONTACT_SERVICE_HOSTPORT
        fromService:
          type: pserv
          name: wapi-contact-service
          property: hostport
      - key: AUTOMATION_SERVICE_HOSTPORT
        fromService:
          type: pserv
          name: wapi-automation-service
          property: hostport
      - key: BILLING_SERVICE_HOSTPORT
        fromService:
          type: pserv
          name: wapi-billing-service
          property: hostport
      - key: SERVICE_PROVIDER_HOSTPORT
        fromService:
          type: pserv
          name: wapi-service-provider
          property: hostport
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: wapi-redis
          property: connectionString

  - type: pserv
    name: wapi-campaign-service
    runtime: node
    plan: starter
    autoDeploy: true
    buildCommand: bash scripts/render-build.sh services/campaign-service
    startCommand: bash scripts/render-start.sh services/campaign-service BILLING_SERVICE_URL=BILLING_SERVICE_HOSTPORT BSP_SERVICE_URL=SERVICE_PROVIDER_HOSTPORT CHAT_SERVICE_URL=CHAT_SERVICE_HOSTPORT CONTACT_SERVICE_URL=CONTACT_SERVICE_HOSTPORT API_GATEWAY_URL=API_GATEWAY_HOSTPORT
    healthCheckPath: /health
    envVars:
      - fromGroup: wapi-production-common
      - key: PORT
        value: 3002
      - key: MONGO_URI
        sync: false
      - key: BILLING_SERVICE_HOSTPORT
        fromService:
          type: pserv
          name: wapi-billing-service
          property: hostport
      - key: SERVICE_PROVIDER_HOSTPORT
        fromService:
          type: pserv
          name: wapi-service-provider
          property: hostport
      - key: CHAT_SERVICE_HOSTPORT
        fromService:
          type: pserv
          name: wapi-chat-service
          property: hostport
      - key: CONTACT_SERVICE_HOSTPORT
        fromService:
          type: pserv
          name: wapi-contact-service
          property: hostport
      - key: API_GATEWAY_HOSTPORT
        fromService:
          type: web
          name: wapi-api-gateway
          property: hostport
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: wapi-redis
          property: connectionString

  - type: pserv
    name: wapi-billing-service
    runtime: node
    plan: starter
    autoDeploy: true
    buildCommand: bash scripts/render-build.sh services/billing-service
    startCommand: bash scripts/render-start.sh services/billing-service BSP_SERVICE_URL=SERVICE_PROVIDER_HOSTPORT
    healthCheckPath: /health
    envVars:
      - fromGroup: wapi-production-common
      - key: PORT
        value: 3003
      - key: MONGO_URI
        sync: false
      - key: SERVICE_PROVIDER_HOSTPORT
        fromService:
          type: pserv
          name: wapi-service-provider
          property: hostport
      - key: PUBLIC_API_URL
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: wapi-redis
          property: connectionString

  - type: pserv
    name: wapi-automation-service
    runtime: node
    plan: starter
    autoDeploy: true
    buildCommand: bash scripts/render-build.sh services/automation-service
    startCommand: bash scripts/render-start.sh services/automation-service MONOLITH_INTERNAL_URL=API_GATEWAY_HOSTPORT BSP_SERVICE_URL=SERVICE_PROVIDER_HOSTPORT CHAT_SERVICE_URL=CHAT_SERVICE_HOSTPORT
    healthCheckPath: /health
    envVars:
      - fromGroup: wapi-production-common
      - key: PORT
        value: 3001
      - key: MONGO_URI
        sync: false
      - key: API_GATEWAY_HOSTPORT
        fromService:
          type: web
          name: wapi-api-gateway
          property: hostport
      - key: SERVICE_PROVIDER_HOSTPORT
        fromService:
          type: pserv
          name: wapi-service-provider
          property: hostport
      - key: CHAT_SERVICE_HOSTPORT
        fromService:
          type: pserv
          name: wapi-chat-service
          property: hostport
      - key: WIDGET_SCRIPT_URL
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: wapi-redis
          property: connectionString

  - type: pserv
    name: wapi-service-provider
    runtime: node
    plan: starter
    autoDeploy: true
    buildCommand: bash scripts/render-build.sh services/service-provider
    startCommand: bash scripts/render-start.sh services/service-provider MAIN_SERVICE_URL=API_GATEWAY_HOSTPORT AUTH_SERVICE_URL=AUTH_SERVICE_HOSTPORT CAMPAIGN_SERVICE_URL=CAMPAIGN_SERVICE_HOSTPORT BILLING_SERVICE_URL=BILLING_SERVICE_HOSTPORT
    healthCheckPath: /health
    envVars:
      - fromGroup: wapi-production-common
      - key: PORT
        value: 3004
      - key: MONGO_URI
        sync: false
      - key: API_GATEWAY_HOSTPORT
        fromService:
          type: web
          name: wapi-api-gateway
          property: hostport
      - key: AUTH_SERVICE_HOSTPORT
        fromService:
          type: pserv
          name: wapi-auth-service
          property: hostport
      - key: CAMPAIGN_SERVICE_HOSTPORT
        fromService:
          type: pserv
          name: wapi-campaign-service
          property: hostport
      - key: BILLING_SERVICE_HOSTPORT
        fromService:
          type: pserv
          name: wapi-billing-service
          property: hostport
      - key: GUPSHUP_PARTNER_BASE_URL
        value: https://partner.gupshup.io
      - key: GUPSHUP_API_BASE_URL
        value: https://api.gupshup.io
      - key: GUPSHUP_PARTNER_EMAIL
        sync: false
      - key: GUPSHUP_PARTNER_CLIENT_SECRET
        sync: false
      - key: GUPSHUP_PARTNER_PASSWORD
        sync: false
      - key: GUPSHUP_PARTNER_TOKEN
        sync: false
      - key: GUPSHUP_WEBHOOK_SECRET
        sync: false
      - key: WHATSAPP_WEBHOOK_VERIFY_TOKEN
        sync: false
      - key: WHATSAPP_WEBHOOK_URL
        sync: false
      - key: ESB_CALLBACK_URL
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: wapi-redis
          property: connectionString

envVarGroups:
  - name: wapi-production-common
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 22
      - key: JWT_SECRET
        generateValue: true
      - key: INTERNAL_SERVICE_SECRET
        generateValue: true
      - key: INTEGRATION_ENCRYPTION_KEY
        generateValue: true
