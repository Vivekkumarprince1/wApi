services:
  - type: web
    name: wapi-api-gateway
    env: node
    plan: free
    rootDir: services/api-gateway
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "20"
      - key: REDIS_URL
        value: redis://default:bOXFUCAIEruLx0YAdY2crNKbVU03AonB@redis-12570.c73.us-east-1-2.ec2.cloud.redislabs.com:12570
      - key: JWT_SECRET
        generateValue: true
      - key: INTERNAL_SERVICE_SECRET
        generateValue: true
      - key: ALLOWED_ORIGINS
        sync: false
      - key: CORE_SERVER_URL
        value: https://wapi-core-server.onrender.com
      - key: WEBSOCKET_SERVICE_URL
        value: https://wapi-websocket-service.onrender.com
      - key: AUTOMATION_SERVICE_URL
        value: https://wapi-automation-service.onrender.com
      - key: CAMPAIGN_SERVICE_URL
        value: https://wapi-campaign-service.onrender.com
      - key: BILLING_SERVICE_URL
        value: https://wapi-billing-service.onrender.com

  - type: web
    name: wapi-core-server
    env: node
    plan: free
    rootDir: services/core-server
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "20"
      - key: REDIS_URL
        value: redis://default:bOXFUCAIEruLx0YAdY2crNKbVU03AonB@redis-12570.c73.us-east-1-2.ec2.cloud.redislabs.com:12570
      - key: JWT_SECRET
        generateValue: true
      - key: INTERNAL_SERVICE_SECRET
        generateValue: true
      - key: MONGODB_URI
        sync: false
      - key: NEXT_PUBLIC_APP_URL
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: AUTOMATION_SERVICE_URL
        value: https://wapi-automation-service.onrender.com
      - key: CAMPAIGN_SERVICE_URL
        value: https://wapi-campaign-service.onrender.com
      - key: BILLING_SERVICE_URL
        value: https://wapi-billing-service.onrender.com
      # Core Server Specifics
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GUPSHUP_PARTNER_EMAIL
        sync: false
      - key: GUPSHUP_PARTNER_CLIENT_SECRET
        sync: false
      - key: GUPSHUP_PARTNER_BASE_URL
        value: https://partner.gupshup.io
      - key: GUPSHUP_API_BASE_URL
        value: https://api.gupshup.io
      - key: GUPSHUP_APP_ID
        sync: false
      - key: GUPSHUP_SOURCE_NUMBER
        sync: false
      - key: WHATSAPP_WEBHOOK_URL
        value: https://wapi-api-gateway.onrender.com/api/webhooks/whatsapp
      - key: WHATSAPP_WEBHOOK_VERIFY_TOKEN
        sync: false
      - key: AI_GEMINI_KEY
        sync: false
      - key: CLOUDINARY_URL
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false
      - key: APP_NAME
        value: wApi
      - key: EMAIL_SERVICE
        value: gmail
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: ENABLE_AUTOMATION_ENGINE
        value: "true"
      - key: START_CAMPAIGN_SCHEDULER
        value: "true"
      - key: BUSINESS_VERIFICATION_MANDATORY
        value: "false"

  - type: web
    name: wapi-automation-service
    env: node
    plan: free
    rootDir: services/automation-service
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "20"
      - key: REDIS_URL
        value: redis://default:bOXFUCAIEruLx0YAdY2crNKbVU03AonB@redis-12570.c73.us-east-1-2.ec2.cloud.redislabs.com:12570
      - key: JWT_SECRET
        generateValue: true
      - key: INTERNAL_SERVICE_SECRET
        generateValue: true
      - key: MONGODB_URI_AUTOMATION
        sync: false
      - key: AI_GEMINI_KEY
        sync: false
      - key: MONOLITH_URL
        value: https://wapi-api-gateway.onrender.com

  - type: web
    name: wapi-campaign-service
    env: node
    plan: free
    rootDir: services/campaign-service
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "20"
      - key: REDIS_URL
        value: redis://default:bOXFUCAIEruLx0YAdY2crNKbVU03AonB@redis-12570.c73.us-east-1-2.ec2.cloud.redislabs.com:12570
      - key: JWT_SECRET
        generateValue: true
      - key: INTERNAL_SERVICE_SECRET
        generateValue: true
      - key: MONGODB_URI_CAMPAIGN
        sync: false
      - key: MONOLITH_URL
        value: https://wapi-api-gateway.onrender.com
      - key: BILLING_SERVICE_URL
        value: https://wapi-billing-service.onrender.com

  - type: web
    name: wapi-billing-service
    env: node
    plan: free
    rootDir: services/billing-service
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "20"
      - key: REDIS_URL
        value: redis://default:bOXFUCAIEruLx0YAdY2crNKbVU03AonB@redis-12570.c73.us-east-1-2.ec2.cloud.redislabs.com:12570
      - key: JWT_SECRET
        generateValue: true
      - key: INTERNAL_SERVICE_SECRET
        generateValue: true
      - key: MONGODB_URI
        sync: false
      - key: MONOLITH_URL
        value: https://wapi-api-gateway.onrender.com
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false

  - type: web
    name: wapi-websocket-service
    env: node
    plan: free
    rootDir: services/websocket-service
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "20"
      - key: REDIS_URL
        value: redis://default:bOXFUCAIEruLx0YAdY2crNKbVU03AonB@redis-12570.c73.us-east-1-2.ec2.cloud.redislabs.com:12570
      - key: JWT_SECRET
        generateValue: true
      - key: INTERNAL_SERVICE_SECRET
        generateValue: true
      - key: CORE_SERVER_URL
        value: https://wapi-core-server.onrender.com
      - key: ALLOWED_ORIGINS
        sync: false
