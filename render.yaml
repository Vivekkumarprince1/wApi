services:
  - type: web
    name: api-gateway
    env: node
    plan: free
    buildCommand: cd packages/contracts && npm install && npm run build && cd ../../services/api-gateway && npm install && npm run build
    startCommand: cd services/api-gateway && npm run start
    envVars:
      - fromGroup: wapi-common-env
      - key: PORT
        value: 5001
      - key: ALLOWED_ORIGINS
        value: https://wapi-frontend.vercel.app,https://wapi-admin.vercel.app
      - key: AUTH_SERVICE_URL
        value: http://auth-service:3006
      - key: CONTACT_SERVICE_URL
        value: http://contact-service:3007
      - key: CHAT_SERVICE_URL
        value: http://chat-service:3008
      - key: SERVICE_PROVIDER_URL
        value: http://service-provider:3004
      - key: AUTOMATION_SERVICE_URL
        value: http://automation-service:3001
      - key: BILLING_SERVICE_URL
        value: http://billing-service:3003
      - key: CAMPAIGN_SERVICE_URL
        value: http://campaign-service:3002
      - key: WEBSOCKET_URL
        value: http://websocket-gateway:3009
      - key: WEBHOOK_INGESTOR_URL
        value: http://webhook-ingestor:3013

  - type: web
    name: webhook-ingestor
    env: node
    plan: free
    buildCommand: cd packages/contracts && npm install && npm run build && cd ../../services/webhook-ingestor && npm install && npm run build
    startCommand: cd services/webhook-ingestor && npm run start
    envVars:
      - fromGroup: wapi-common-env
      - key: PORT
        value: 3013
      - key: MONGO_URI
        sync: false
      - key: VERIFY_TOKEN
        value: wapi-verify-token
      - key: WEBHOOK_SECRET
        generateValue: true

  - type: web
    name: websocket-gateway
    env: node
    plan: free
    buildCommand: cd packages/contracts && npm install && npm run build && cd ../../services/websocket-gateway && npm install && npm run build
    startCommand: cd services/websocket-gateway && npm run start
    envVars:
      - fromGroup: wapi-common-env
      - key: PORT
        value: 3009
      - key: ALLOWED_ORIGINS
        value: https://wapi-frontend.vercel.app,https://wapi-admin.vercel.app
      - key: MONGO_URI
        sync: false

  - type: web
    name: auth-service
    env: node
    plan: free
    buildCommand: cd packages/contracts && npm install && npm run build && cd ../../services/auth-service && npm install && npm run build
    startCommand: cd services/auth-service && npm run start
    envVars:
      - fromGroup: wapi-common-env
      - key: PORT
        value: 3006
      - key: MONGO_URI
        sync: false

  - type: web
    name: campaign-service
    env: node
    plan: free
    buildCommand: cd packages/contracts && npm install && npm run build && cd ../../services/campaign-service && npm install && npm run build
    startCommand: cd services/campaign-service && npm run start
    envVars:
      - fromGroup: wapi-common-env
      - key: PORT
        value: 3002
      - key: MONGO_URI
        sync: false

  - type: web
    name: billing-service
    env: node
    plan: free
    buildCommand: cd packages/contracts && npm install && npm run build && cd ../../services/billing-service && npm install && npm run build
    startCommand: cd services/billing-service && npm run start
    envVars:
      - fromGroup: wapi-common-env
      - key: PORT
        value: 3003
      - key: MONGO_URI
        sync: false

  - type: web
    name: service-provider
    env: node
    plan: free
    buildCommand: cd packages/contracts && npm install && npm run build && cd ../../services/service-provider && npm install && npm run build
    startCommand: cd services/service-provider && npm run start
    envVars:
      - fromGroup: wapi-common-env
      - key: PORT
        value: 3004
      - key: MONGO_URI
        sync: false
      - key: MAIN_SERVICE_URL
        value: http://api-gateway:5001

  - type: web
    name: automation-service
    env: node
    plan: free
    buildCommand: cd packages/contracts && npm install && npm run build && cd ../../services/automation-service && npm install && npm run build
    startCommand: cd services/automation-service && npm run start
    envVars:
      - fromGroup: wapi-common-env
      - key: PORT
        value: 3001
      - key: MONGO_URI
        sync: false

  - type: web
    name: chat-service
    env: node
    plan: free
    buildCommand: cd packages/contracts && npm install && npm run build && cd ../../services/chat-service && npm install && npm run build
    startCommand: cd services/chat-service && npm run start
    envVars:
      - fromGroup: wapi-common-env
      - key: PORT
        value: 3008
      - key: MONGO_URI
        sync: false

  - type: web
    name: contact-service
    env: node
    plan: free
    buildCommand: cd packages/contracts && npm install && npm run build && cd ../../services/contact-service && npm install && npm run build
    startCommand: cd services/contact-service && npm run start
    envVars:
      - fromGroup: wapi-common-env
      - key: PORT
        value: 3007
      - key: MONGO_URI
        sync: false

envVarGroups:
  - name: wapi-common-env
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: INTERNAL_SERVICE_SECRET
        generateValue: true
      - key: REDIS_URL
        sync: false
      - key: KAFKA_BROKER
        sync: false
