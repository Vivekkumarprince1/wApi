envVarGroups:
  - name: wapi-shared-auth
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: INTERNAL_SERVICE_SECRET
        generateValue: true

services:
  - type: web
    name: wapi-api-gateway
    runtime: docker
    plan: free
    dockerContext: .
    dockerfilePath: services/api-gateway/Dockerfile
    healthCheckPath: /live
    envVars:
      - fromGroup: wapi-shared-auth

  - type: web
    name: wapi-core-server
    runtime: docker
    plan: free
    dockerContext: .
    dockerfilePath: services/core-server/Dockerfile
    healthCheckPath: /live
    envVars:
      - fromGroup: wapi-shared-auth

  - type: web
    name: wapi-automation-service
    runtime: docker
    plan: free
    dockerContext: .
    dockerfilePath: services/automation-service/Dockerfile
    healthCheckPath: /live
    envVars:
      - fromGroup: wapi-shared-auth

  - type: web
    name: wapi-campaign-service
    runtime: docker
    plan: free
    dockerContext: .
    dockerfilePath: services/campaign-service/Dockerfile
    healthCheckPath: /live
    envVars:
      - fromGroup: wapi-shared-auth

  - type: web
    name: wapi-billing-service
    runtime: docker
    plan: free
    dockerContext: .
    dockerfilePath: services/billing-service/Dockerfile
    healthCheckPath: /live
    envVars:
      - fromGroup: wapi-shared-auth
