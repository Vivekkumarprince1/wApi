envVarGroups:
  - name: wapi-shared-auth
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: INTERNAL_SERVICE_SECRET
        generateValue: true

services:
  - type: keyvalue
    name: wapi-valkey
    plan: free
    maxmemoryPolicy: noeviction
    ipAllowList: []

  - type: web
    name: wapi-core-server
    runtime: docker
    plan: free
    dockerContext: .
    dockerfilePath: services/core-server/Dockerfile
    healthCheckPath: /live
    envVars:
      - fromGroup: wapi-shared-auth
      - key: VALKEY_URL
        fromService:
          type: keyvalue
          name: wapi-valkey
          property: connectionString

  - type: web
    name: wapi-automation-service
    runtime: docker
    plan: free
    dockerContext: .
    dockerfilePath: services/automation-service/Dockerfile
    healthCheckPath: /live
    envVars:
      - fromGroup: wapi-shared-auth
      - key: VALKEY_URL
        fromService:
          type: keyvalue
          name: wapi-valkey
          property: connectionString

  - type: web
    name: wapi-campaign-service
    runtime: docker
    plan: free
    dockerContext: .
    dockerfilePath: services/campaign-service/Dockerfile
    healthCheckPath: /live
    envVars:
      - fromGroup: wapi-shared-auth
      - key: VALKEY_URL
        fromService:
          type: keyvalue
          name: wapi-valkey
          property: connectionString

  - type: web
    name: wapi-billing-service
    runtime: docker
    plan: free
    dockerContext: .
    dockerfilePath: services/billing-service/Dockerfile
    healthCheckPath: /live
    envVars:
      - fromGroup: wapi-shared-auth
      - key: VALKEY_URL
        fromService:
          type: keyvalue
          name: wapi-valkey
          property: connectionString
