name: Deploy to AKS through GitOps

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      image_tag:
        description: Optional image tag override. Defaults to the commit SHA.
        required: false
        type: string

permissions:
  contents: read
  id-token: write

env:
  NODE_VERSION: 24
  ACR_NAME: ${{ vars.ACR_NAME }}
  ACR_LOGIN_SERVER: ${{ vars.ACR_NAME }}.azurecr.io
  IMAGE_TAG: ${{ inputs.image_tag || github.sha }}
  GITOPS_REPO: ${{ vars.GITOPS_REPO }}
  GITOPS_BRANCH: ${{ vars.GITOPS_BRANCH || 'main' }}
  GITOPS_ENV_DIR: ${{ vars.GITOPS_ENV_DIR || 'environments/production/connectsphere' }}

jobs:
  quality-gate:
    name: Build and test ${{ matrix.service.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - { name: 'contracts', dir: 'packages/contracts', needs_contracts: false }
          - { name: 'api-gateway', dir: 'services/api-gateway', needs_contracts: true }
          - { name: 'auth-service', dir: 'services/auth-service', needs_contracts: true }
          - { name: 'campaign-service', dir: 'services/campaign-service', needs_contracts: true }
          - { name: 'billing-service', dir: 'services/billing-service', needs_contracts: true }
          - { name: 'service-provider', dir: 'services/service-provider', needs_contracts: true }
          - { name: 'automation-service', dir: 'services/automation-service', needs_contracts: true }
          - { name: 'chat-service', dir: 'services/chat-service', needs_contracts: true }
          - { name: 'contact-service', dir: 'services/contact-service', needs_contracts: true }
          - { name: 'webhook-ingestor', dir: 'services/webhook-ingestor', needs_contracts: true }
          - { name: 'websocket-gateway', dir: 'services/websocket-gateway', needs_contracts: true }
          - { name: 'admin-portal', dir: 'apps/admin-portal', needs_contracts: true }
          - { name: 'career-portal', dir: 'apps/career-portal', needs_contracts: false }
          - { name: 'customer-portal', dir: 'apps/customer-portal', needs_contracts: false }
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Build contracts dependency
        if: ${{ matrix.service.needs_contracts }}
        run: |
          cd packages/contracts
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi
          npm run build

      - name: Install dependencies
        run: |
          cd ${{ matrix.service.dir }}
          if [ -f pnpm-lock.yaml ]; then
            corepack enable
            pnpm install --frozen-lockfile
          elif [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Build
        env:
          MONGODB_URI: mongodb://127.0.0.1:27017/connectsphere
          BETTER_AUTH_SECRET: connectsphere-ci-career-secret-000000000000000
          BETTER_AUTH_URL: http://localhost:3001
          APP_URL: http://localhost:3001
        run: |
          cd ${{ matrix.service.dir }}
          npm run build

      - name: Test if configured
        run: |
          cd ${{ matrix.service.dir }}
          test_script="$(node -p "require('./package.json').scripts?.test || ''")"
          if [ -z "$test_script" ] || echo "$test_script" | grep -qi 'no test specified'; then
            echo "No runnable test script configured for ${{ matrix.service.name }}; skipping."
            exit 0
          fi
          npm test

      - name: Lint if configured
        run: |
          cd ${{ matrix.service.dir }}
          if npm run | grep -q 'lint'; then
            npm run lint
          fi

  docker-build:
    name: Build and push ${{ matrix.image }}
    runs-on: ubuntu-latest
    needs: quality-gate
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: api-gateway
            dockerfile: services/api-gateway/Dockerfile
          - image: auth-service
            dockerfile: services/auth-service/Dockerfile
          - image: campaign-service
            dockerfile: services/campaign-service/Dockerfile
          - image: billing-service
            dockerfile: services/billing-service/Dockerfile
          - image: service-provider
            dockerfile: services/service-provider/Dockerfile
          - image: automation-service
            dockerfile: services/automation-service/Dockerfile
          - image: chat-service
            dockerfile: services/chat-service/Dockerfile
          - image: contact-service
            dockerfile: services/contact-service/Dockerfile
          - image: webhook-ingestor
            dockerfile: services/webhook-ingestor/Dockerfile
          - image: websocket-gateway
            dockerfile: services/websocket-gateway/Dockerfile
          - image: admin-portal
            dockerfile: apps/admin-portal/Dockerfile
          - image: career-portal
            dockerfile: apps/career-portal/Dockerfile
          - image: customer-portal
            dockerfile: apps/customer-portal/Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Validate deployment variables
        run: |
          test -n "$ACR_NAME" || (echo "::error::Set repository variable ACR_NAME" && exit 1)
          test -n "${{ vars.AZURE_CLIENT_ID }}" || (echo "::error::Set repository variable AZURE_CLIENT_ID" && exit 1)
          test -n "${{ vars.AZURE_TENANT_ID }}" || (echo "::error::Set repository variable AZURE_TENANT_ID" && exit 1)
          test -n "${{ vars.AZURE_SUBSCRIPTION_ID }}" || (echo "::error::Set repository variable AZURE_SUBSCRIPTION_ID" && exit 1)

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: az acr login --name "$ACR_NAME"

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.ACR_LOGIN_SERVER }}/connectsphere/${{ matrix.image }}:${{ env.IMAGE_TAG }}
          build-args: |
            NEXT_PUBLIC_APP_NAME=${{ vars.NEXT_PUBLIC_APP_NAME || 'ConnectSphere' }}
            NEXT_PUBLIC_APP_URL=${{ vars.NEXT_PUBLIC_APP_URL }}
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL || '/api' }}
            NEXT_PUBLIC_SOCKET_URL=${{ vars.NEXT_PUBLIC_SOCKET_URL || 'https://connectsphere-api-vivek.eastus.cloudapp.azure.com' }}
            NEXT_PUBLIC_GOOGLE_CLIENT_ID=${{ vars.NEXT_PUBLIC_GOOGLE_CLIENT_ID }}
            NEXT_PUBLIC_FACEBOOK_APP_ID=${{ vars.NEXT_PUBLIC_FACEBOOK_APP_ID }}
            NEXT_PUBLIC_BUSINESS_VERIFICATION_MANDATORY=${{ vars.NEXT_PUBLIC_BUSINESS_VERIFICATION_MANDATORY || 'false' }}
            BACKEND_API_URL=${{ vars.BACKEND_API_URL || 'http://connectsphere-api-gateway:5001' }}
            APP_URL=${{ vars.CAREER_PORTAL_URL || 'https://connectsphere-career-vivek.eastus.cloudapp.azure.com' }}
            BETTER_AUTH_URL=${{ vars.CAREER_PORTAL_URL || 'https://connectsphere-career-vivek.eastus.cloudapp.azure.com' }}
            NEXT_PUBLIC_RECAPTCHA_SITE_KEY=${{ vars.CAREER_RECAPTCHA_SITE_KEY }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan image for critical vulnerabilities
        uses: aquasecurity/trivy-action@0.32.0
        with:
          image-ref: ${{ env.ACR_LOGIN_SERVER }}/connectsphere/${{ matrix.image }}:${{ env.IMAGE_TAG }}
          format: table
          exit-code: '1'
          severity: CRITICAL
          ignore-unfixed: true

  update-gitops:
    name: Update Helm values in GitOps repo
    runs-on: ubuntu-latest
    needs: docker-build
    permissions:
      contents: read
    steps:
      - name: Validate GitOps variables
        run: |
          test -n "$GITOPS_REPO" || (echo "::error::Set repository variable GITOPS_REPO as owner/repo" && exit 1)
          test -n "${{ secrets.GITOPS_TOKEN }}" || (echo "::error::Set secret GITOPS_TOKEN with write access to the GitOps repo" && exit 1)

      - name: Checkout application repo
        uses: actions/checkout@v5
        with:
          path: source

      - name: Checkout GitOps repo
        uses: actions/checkout@v5
        with:
          repository: ${{ env.GITOPS_REPO }}
          token: ${{ secrets.GITOPS_TOKEN }}
          ref: ${{ env.GITOPS_BRANCH }}
          path: gitops

      - name: Copy Helm chart and update production values
        run: |
          set -euo pipefail
          mkdir -p "gitops/$GITOPS_ENV_DIR"

          if [ ! -f "gitops/$GITOPS_ENV_DIR/production-values.yaml" ]; then
            cp source/deploy/gitops/production-values.yaml "gitops/$GITOPS_ENV_DIR/production-values.yaml"
          fi

          rsync -a --delete --exclude production-values.yaml source/deploy/helm/connectsphere/ "gitops/$GITOPS_ENV_DIR/"

          python3 source/deploy/scripts/update-values.py \
            "gitops/$GITOPS_ENV_DIR/production-values.yaml" \
            "$ACR_LOGIN_SERVER" \
            "$IMAGE_TAG"

      - name: Commit GitOps update
        working-directory: gitops
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet; then
            echo "GitOps repo already points at $IMAGE_TAG."
            exit 0
          fi

          git add "$GITOPS_ENV_DIR"
          git commit -m "Deploy ConnectSphere $IMAGE_TAG"
          git push origin "HEAD:$GITOPS_BRANCH"
