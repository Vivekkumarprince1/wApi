name: Build and Deploy to AKS

on:
  push:
    branches:
      - main # Trigger deployment on pushes to main

env:
  AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  ACR_NAME: "acrswapiprod" # Must match terraform
  AKS_CLUSTER_NAME: "aks-wapi-prod" # Must match terraform
  AKS_RESOURCE_GROUP: "rg-wapi-prod" # Must match terraform

permissions:
  id-token: write
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - service: api-gateway
            context: .
            dockerfile: services/api-gateway/Dockerfile
          - service: auth-service
            context: .
            dockerfile: services/auth-service/Dockerfile
          - service: campaign-service
            context: .
            dockerfile: services/campaign-service/Dockerfile
          - service: billing-service
            context: .
            dockerfile: services/billing-service/Dockerfile
          - service: service-provider
            context: .
            dockerfile: services/service-provider/Dockerfile
          - service: automation-service
            context: .
            dockerfile: services/automation-service/Dockerfile
          - service: chat-service
            context: .
            dockerfile: services/chat-service/Dockerfile
          - service: contact-service
            context: .
            dockerfile: services/contact-service/Dockerfile
          - service: webhook-ingestor
            context: .
            dockerfile: services/webhook-ingestor/Dockerfile
          - service: websocket-gateway
            context: .
            dockerfile: services/websocket-gateway/Dockerfile
          - service: admin-portal
            context: .
            dockerfile: apps/admin-portal/Dockerfile
          - service: frontend
            context: .
            dockerfile: apps/frontend/Dockerfile
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: 'Azure login'
        uses: azure/login@v1
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to ACR
        run: |
          az acr login --name ${{ env.ACR_NAME }}

      - name: Build and Push Docker Image
        run: |
          IMAGE_TAG=${{ github.sha }}
          ACR_SERVER=${{ env.ACR_NAME }}.azurecr.io
          IMAGE_NAME=$ACR_SERVER/${{ matrix.service }}
          
          docker build -t $IMAGE_NAME:$IMAGE_TAG -t $IMAGE_NAME:latest -f ${{ matrix.dockerfile }} ${{ matrix.context }}
          docker push $IMAGE_NAME:$IMAGE_TAG
          docker push $IMAGE_NAME:latest

  deploy-to-aks:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: 'Azure login'
        uses: azure/login@v1
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Get AKS Credentials
        run: |
          az aks get-credentials --resource-group ${{ env.AKS_RESOURCE_GROUP }} --name ${{ env.AKS_CLUSTER_NAME }} --overwrite-existing

      - name: Deploy Kubernetes Manifests
        run: |
          # Create namespace if it doesn't exist
          kubectl apply -f k8s/namespace.yaml
          
          # Deploy SecretProviderClass, Ingress, and Services
          kubectl apply -f k8s/secret-provider-class.yaml
          kubectl apply -f k8s/ingress.yaml
          
          # We deploy 'services.yaml' which contains all deployments and services
          # The images inside point to 'latest'. In a true CI/CD, we would replace 'latest' with ${{ github.sha }}
          kubectl apply -f k8s/services.yaml

          # Force rollout restart to pick up latest images if using 'latest' tag
          kubectl rollout restart deployment -n wapi
