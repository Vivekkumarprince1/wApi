name: CI Build Pipeline

on:
  push:
    branches: [ main, master, dev ]
  pull_request:
    branches: [ main, master, dev ]

jobs:
  dependency-security:
    name: Runtime dependency security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
      - name: Audit runtime dependencies
        run: |
          set -euo pipefail
          for dir in packages/contracts services/* apps/admin-portal apps/customer-portal; do
            if [ -f "$dir/package-lock.json" ]; then
              (cd "$dir" && npm audit --omit=dev --audit-level=critical)
            fi
          done

  lint-baseline:
    name: Frontend lint baseline
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
      - run: npm ci --prefix apps/admin-portal
      - run: npm ci --prefix apps/customer-portal
      - run: ./scripts/production/check-lint-baseline.sh

  helm-validation:
    name: Helm production validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: azure/setup-helm@v4
      - run: helm lint deploy/helm/connectsphere -f deploy/gitops/production-values.yaml
      - run: helm template connectsphere deploy/helm/connectsphere -f deploy/gitops/production-values.yaml >/tmp/connectsphere.yaml

  production-readiness:
    name: Production Readiness Static Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Run Production Readiness Checks
        run: ./scripts/production/check-readiness.sh

  build-shared:
    name: Build Shared Packages
    needs: [production-readiness, dependency-security]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Build Contracts
        run: |
          cd packages/contracts
          npm install
          npm run build

      - name: Cache Shared Contracts Build
        uses: actions/cache/save@v5
        with:
          path: packages/contracts/dist
          key: ${{ github.sha }}-contracts-dist

  build-services:
    name: Build ${{ matrix.service.name }}
    needs: build-shared
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - { name: 'api-gateway', dir: 'services/api-gateway', needs_contracts: true }
          - { name: 'auth-service', dir: 'services/auth-service', needs_contracts: true }
          - { name: 'campaign-service', dir: 'services/campaign-service', needs_contracts: true }
          - { name: 'billing-service', dir: 'services/billing-service', needs_contracts: true }
          - { name: 'service-provider', dir: 'services/service-provider', needs_contracts: true }
          - { name: 'automation-service', dir: 'services/automation-service', needs_contracts: true }
          - { name: 'chat-service', dir: 'services/chat-service', needs_contracts: true }
          - { name: 'contact-service', dir: 'services/contact-service', needs_contracts: true }
          - { name: 'webhook-ingestor', dir: 'services/webhook-ingestor', needs_contracts: true }
          - { name: 'websocket-gateway', dir: 'services/websocket-gateway', needs_contracts: true }
          - { name: 'admin-portal', dir: 'apps/admin-portal', needs_contracts: true }
          - { name: 'career-portal', dir: 'apps/career-portal', needs_contracts: false }
          - { name: 'customer-portal', dir: 'apps/customer-portal', needs_contracts: false }

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Restore Shared Contracts Build
        if: ${{ matrix.service.needs_contracts }}
        uses: actions/cache/restore@v5
        with:
          path: packages/contracts/dist
          key: ${{ github.sha }}-contracts-dist
          fail-on-cache-miss: true

      - name: Install Contracts dependency locally
        if: ${{ matrix.service.needs_contracts }}
        run: |
          cd packages/contracts
          npm install

      - name: Install Service Dependencies
        run: |
          cd ${{ matrix.service.dir }}
          if [ -f pnpm-lock.yaml ]; then
            corepack enable
            pnpm install --frozen-lockfile
          elif [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Compile and Build
        env:
          MONGODB_URI: mongodb://127.0.0.1:27017/connectsphere
          BETTER_AUTH_SECRET: connectsphere-ci-career-secret-000000000000000
          BETTER_AUTH_URL: http://localhost:3001
          APP_URL: http://localhost:3001
        run: |
          cd ${{ matrix.service.dir }}
          npm run build

      - name: Test (if configured)
        run: |
          cd ${{ matrix.service.dir }}
          test_script="$(node -p "require('./package.json').scripts?.test || ''")"
          if [ -z "$test_script" ] || echo "$test_script" | grep -qi 'no test specified'; then
            echo "No runnable test script configured for ${{ matrix.service.name }}; skipping."
            exit 0
          fi
          npm test

      - name: Lint (if configured)
        run: |
          cd ${{ matrix.service.dir }}
          if npm run | grep -q 'lint'; then
            npm run lint
          fi
