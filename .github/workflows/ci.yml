name: CI Build Pipeline

on:
  push:
    branches: [ main, master, dev ]
  pull_request:
    branches: [ main, master, dev ]

jobs:
  detect-changes:
    name: Detect changed components
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.changes.outputs.services }}
      has_services: ${{ steps.changes.outputs.has_services }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - id: changes
        name: Build component matrix
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          node scripts/ci/changed-services.mjs "$BASE_SHA" "$HEAD_SHA" > /tmp/changes.json
          cat /tmp/changes.json
          echo "services=$(jq -c '.services' /tmp/changes.json)" >> "$GITHUB_OUTPUT"
          echo "has_services=$(jq -r '.hasServices' /tmp/changes.json)" >> "$GITHUB_OUTPUT"

  dependency-security:
    name: Runtime dependency security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
      - name: Audit runtime dependencies
        run: |
          set -euo pipefail
          for dir in packages/contracts services/* apps/admin-portal apps/customer-portal; do
            if [ -f "$dir/package-lock.json" ]; then
              (cd "$dir" && npm audit --omit=dev --audit-level=critical)
            fi
          done

  lint-baseline:
    name: Frontend lint baseline
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
      - run: npm ci --prefix apps/admin-portal
      - run: npm ci --prefix apps/customer-portal
      - run: ./scripts/production/check-lint-baseline.sh

  helm-validation:
    name: Helm production validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: azure/setup-helm@v4
      - run: helm lint deploy/helm/connectsphere -f deploy/gitops/production-values.yaml
      - run: helm template connectsphere deploy/helm/connectsphere -f deploy/gitops/production-values.yaml >/tmp/connectsphere.yaml

  production-readiness:
    name: Production Readiness Static Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Run Production Readiness Checks
        run: ./scripts/production/check-readiness.sh

  build-services:
    name: Build ${{ matrix.service.name }}
    needs: [detect-changes, production-readiness, dependency-security]
    if: ${{ needs.detect-changes.outputs.has_services == 'true' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJSON(needs.detect-changes.outputs.services) }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Build contracts dependency
        if: ${{ matrix.service.needs_contracts }}
        run: |
          cd packages/contracts
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi
          npm run build

      - name: Install Service Dependencies
        run: |
          cd ${{ matrix.service.dir }}
          if [ -f pnpm-lock.yaml ]; then
            corepack enable
            pnpm install --frozen-lockfile
          elif [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Compile and Build
        env:
          MONGODB_URI: mongodb://127.0.0.1:27017/connectsphere
          BETTER_AUTH_SECRET: connectsphere-ci-career-secret-000000000000000
          BETTER_AUTH_URL: http://localhost:3001
          APP_URL: http://localhost:3001
        run: |
          cd ${{ matrix.service.dir }}
          npm run build

      - name: Test (if configured)
        run: |
          cd ${{ matrix.service.dir }}
          test_script="$(node -p "require('./package.json').scripts?.test || ''")"
          if [ -z "$test_script" ] || echo "$test_script" | grep -qi 'no test specified'; then
            echo "No runnable test script configured for ${{ matrix.service.name }}; skipping."
            exit 0
          fi
          npm test

      - name: Lint (if configured)
        run: |
          cd ${{ matrix.service.dir }}
          if npm run | grep -q 'lint'; then
            npm run lint
          fi
