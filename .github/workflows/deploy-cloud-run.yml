name: Deploy Backend to Cloud Run

on:
  push:
    branches: [main]
    paths:
      - "services/**"
      - "packages/contracts/**"
      - ".github/workflows/deploy-cloud-run.yml"
  workflow_dispatch:
    inputs:
      service:
        description: "Service to deploy: all, api-gateway, auth-service, contact-service, chat-service, billing-service, campaign-service, automation-service, service-provider, webhook-ingestor, websocket-gateway"
        type: choice
        required: true
        default: "all"
        options:
          - all
          - api-gateway
          - auth-service
          - contact-service
          - chat-service
          - billing-service
          - campaign-service
          - automation-service
          - service-provider
          - webhook-ingestor
          - websocket-gateway

concurrency:
  group: cloud-run-backend-${{ github.ref }}
  cancel-in-progress: false

env:
  PROJECT_ID: wapi-backend-56102
  REGION: us-central1
  ARTIFACT_REPOSITORY: wapi-repo
  DOCKERHUB_NAMESPACE: ${{ vars.DOCKERHUB_NAMESPACE || 'thevivek2003' }}
  WIF_PROVIDER: projects/527014678364/locations/global/workloadIdentityPools/github-actions/providers/github
  WIF_SERVICE_ACCOUNT: github-cloud-run-deployer@wapi-backend-56102.iam.gserviceaccount.com

jobs:
  deploy:
    name: Deploy ${{ matrix.service.name }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        service:
          - name: api-gateway
            dockerfile: services/api-gateway/Dockerfile
          - name: auth-service
            dockerfile: services/auth-service/Dockerfile
          - name: contact-service
            dockerfile: services/contact-service/Dockerfile
          - name: chat-service
            dockerfile: services/chat-service/Dockerfile
          - name: billing-service
            dockerfile: services/billing-service/Dockerfile
          - name: campaign-service
            dockerfile: services/campaign-service/Dockerfile
          - name: automation-service
            dockerfile: services/automation-service/Dockerfile
          - name: service-provider
            dockerfile: services/service-provider/Dockerfile
          - name: webhook-ingestor
            dockerfile: services/webhook-ingestor/Dockerfile
          - name: websocket-gateway
            dockerfile: services/websocket-gateway/Dockerfile

    steps:
      - name: Skip unmatched manual service
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.service != 'all' && github.event.inputs.service != matrix.service.name }}
        run: echo "Skipping ${{ matrix.service.name }}"

      - name: Checkout
        if: ${{ github.event_name == 'push' || github.event.inputs.service == 'all' || github.event.inputs.service == matrix.service.name }}
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        if: ${{ github.event_name == 'push' || github.event.inputs.service == 'all' || github.event.inputs.service == matrix.service.name }}
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.WIF_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        if: ${{ github.event_name == 'push' || github.event.inputs.service == 'all' || github.event.inputs.service == matrix.service.name }}
        uses: google-github-actions/setup-gcloud@v3

      - name: Setup Docker Buildx
        if: ${{ github.event_name == 'push' || github.event.inputs.service == 'all' || github.event.inputs.service == matrix.service.name }}
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: ${{ github.event_name == 'push' || github.event.inputs.service == 'all' || github.event.inputs.service == matrix.service.name }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to Artifact Registry
        if: ${{ github.event_name == 'push' || github.event.inputs.service == 'all' || github.event.inputs.service == matrix.service.name }}
        run: gcloud auth configure-docker "${REGION}-docker.pkg.dev" --quiet

      - name: Build and push image
        if: ${{ github.event_name == 'push' || github.event.inputs.service == 'all' || github.event.inputs.service == matrix.service.name }}
        env:
          DOCKERHUB_IMAGE: docker.io/${{ env.DOCKERHUB_NAMESPACE }}/wapi-${{ matrix.service.name }}
          ARTIFACT_IMAGE: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.ARTIFACT_REPOSITORY }}/wapi-${{ matrix.service.name }}
        run: |
          docker buildx build \
            --platform=linux/amd64 \
            -f "${{ matrix.service.dockerfile }}" \
            -t "${DOCKERHUB_IMAGE}:${{ github.sha }}" \
            -t "${DOCKERHUB_IMAGE}:latest" \
            -t "${ARTIFACT_IMAGE}:${{ github.sha }}" \
            -t "${ARTIFACT_IMAGE}:latest" \
            --push \
            .

      - name: Update Cloud Run service
        if: ${{ github.event_name == 'push' || github.event.inputs.service == 'all' || github.event.inputs.service == matrix.service.name }}
        env:
          IMAGE: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.ARTIFACT_REPOSITORY }}/wapi-${{ matrix.service.name }}:${{ github.sha }}
        run: |
          gcloud run services update "${{ matrix.service.name }}" \
            --project="${PROJECT_ID}" \
            --region="${REGION}" \
            --image="${IMAGE}" \
            --quiet
