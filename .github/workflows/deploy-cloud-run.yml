name: Deploy to Cloud Run

on:
  push:
    branches: [main]
    paths:
      - "apps/admin-portal/**"
      - "apps/customer-portal/**"
      - "services/**"
      - "packages/contracts/**"
      - ".github/workflows/deploy-cloud-run.yml"
  workflow_dispatch:
    inputs:
      service:
        description: "Service to deploy"
        type: choice
        required: true
        default: "all"
        options:
          - all
          - admin-portal
          - customer-portal
          - api-gateway
          - auth-service
          - contact-service
          - chat-service
          - billing-service
          - campaign-service
          - automation-service
          - service-provider
          - webhook-ingestor
          - websocket-gateway

concurrency:
  group: cloud-run-${{ github.ref }}
  cancel-in-progress: false

env:
  PROJECT_ID: wapi-backend-56102
  REGION: us-central1
  ARTIFACT_REPOSITORY: wapi-repo
  DOCKERHUB_NAMESPACE: ${{ vars.DOCKERHUB_NAMESPACE || 'thevivek2003' }}
  WIF_PROVIDER: projects/527014678364/locations/global/workloadIdentityPools/github-actions/providers/github
  WIF_SERVICE_ACCOUNT: github-cloud-run-deployer@wapi-backend-56102.iam.gserviceaccount.com

jobs:
  deploy:
    name: Deploy ${{ matrix.service.name }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        service:
          - name: api-gateway
            dockerfile: services/api-gateway/Dockerfile
          - name: auth-service
            dockerfile: services/auth-service/Dockerfile
          - name: contact-service
            dockerfile: services/contact-service/Dockerfile
          - name: chat-service
            dockerfile: services/chat-service/Dockerfile
          - name: billing-service
            dockerfile: services/billing-service/Dockerfile
          - name: campaign-service
            dockerfile: services/campaign-service/Dockerfile
          - name: automation-service
            dockerfile: services/automation-service/Dockerfile
          - name: service-provider
            dockerfile: services/service-provider/Dockerfile
          - name: webhook-ingestor
            dockerfile: services/webhook-ingestor/Dockerfile
          - name: websocket-gateway
            dockerfile: services/websocket-gateway/Dockerfile
          - name: customer-portal
            dockerfile: apps/customer-portal/Dockerfile
          - name: admin-portal
            dockerfile: apps/admin-portal/Dockerfile

    steps:
      - name: Skip unmatched manual service
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.service != 'all' && github.event.inputs.service != matrix.service.name }}
        run: echo "Skipping ${{ matrix.service.name }}"

      - name: Checkout
        if: ${{ github.event_name == 'push' || github.event.inputs.service == 'all' || github.event.inputs.service == matrix.service.name }}
        uses: actions/checkout@v5

      - name: Authenticate to Google Cloud
        if: ${{ github.event_name == 'push' || github.event.inputs.service == 'all' || github.event.inputs.service == matrix.service.name }}
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.WIF_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        if: ${{ github.event_name == 'push' || github.event.inputs.service == 'all' || github.event.inputs.service == matrix.service.name }}
        uses: google-github-actions/setup-gcloud@v3

      - name: Setup Docker Buildx
        if: ${{ github.event_name == 'push' || github.event.inputs.service == 'all' || github.event.inputs.service == matrix.service.name }}
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        if: ${{ github.event_name == 'push' || github.event.inputs.service == 'all' || github.event.inputs.service == matrix.service.name }}
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to Artifact Registry
        if: ${{ github.event_name == 'push' || github.event.inputs.service == 'all' || github.event.inputs.service == matrix.service.name }}
        run: gcloud auth configure-docker "${REGION}-docker.pkg.dev" --quiet

      - name: Build and push image
        if: ${{ github.event_name == 'push' || github.event.inputs.service == 'all' || github.event.inputs.service == matrix.service.name }}
        env:
          DOCKERHUB_IMAGE: docker.io/${{ env.DOCKERHUB_NAMESPACE }}/wapi-${{ matrix.service.name }}
          ARTIFACT_IMAGE: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.ARTIFACT_REPOSITORY }}/wapi-${{ matrix.service.name }}
        run: |
          service_url() {
            gcloud run services describe "$1" \
              --project="${PROJECT_ID}" \
              --region="${REGION}" \
              --format='value(status.url)'
          }

          service_env() {
            gcloud run services describe "$1" \
              --project="${PROJECT_ID}" \
              --region="${REGION}" \
              --format=json \
              | jq -r --arg key "$2" '.spec.template.spec.containers[0].env[]? | select(.name == $key) | .value // ""' \
              | tail -n 1
          }

          BUILD_ARGS=()

          if [[ "${{ matrix.service.name }}" == "customer-portal" ]]; then
            CUSTOMER_URL="$(service_url customer-portal)"
            API_GATEWAY_URL="$(service_url api-gateway)"
            WEBSOCKET_URL="$(service_url websocket-gateway)"
            CUSTOMER_APP_NAME="$(service_env customer-portal NEXT_PUBLIC_APP_NAME)"
            CUSTOMER_API_URL="$(service_env customer-portal NEXT_PUBLIC_API_URL)"
            BUSINESS_VERIFICATION_MANDATORY="$(service_env customer-portal NEXT_PUBLIC_BUSINESS_VERIFICATION_MANDATORY)"
            CUSTOMER_APP_NAME="${CUSTOMER_APP_NAME:-ConnectSphare}"
            CUSTOMER_API_URL="${CUSTOMER_API_URL:-/api}"
            BUSINESS_VERIFICATION_MANDATORY="${BUSINESS_VERIFICATION_MANDATORY:-false}"

            BUILD_ARGS+=(
              --build-arg "NEXT_PUBLIC_APP_NAME=${CUSTOMER_APP_NAME}"
              --build-arg "NEXT_PUBLIC_APP_URL=${CUSTOMER_URL}"
              --build-arg "NEXT_PUBLIC_API_URL=${CUSTOMER_API_URL}"
              --build-arg "NEXT_PUBLIC_SOCKET_URL=${WEBSOCKET_URL}"
              --build-arg "NEXT_PUBLIC_GOOGLE_CLIENT_ID=$(service_env customer-portal NEXT_PUBLIC_GOOGLE_CLIENT_ID)"
              --build-arg "NEXT_PUBLIC_FACEBOOK_APP_ID=$(service_env customer-portal NEXT_PUBLIC_FACEBOOK_APP_ID)"
              --build-arg "NEXT_PUBLIC_BUSINESS_VERIFICATION_MANDATORY=${BUSINESS_VERIFICATION_MANDATORY}"
              --build-arg "BACKEND_API_URL=${API_GATEWAY_URL}"
              --build-arg "ALLOWED_DEV_ORIGINS=${CUSTOMER_URL}"
            )
          fi

          if [[ "${{ matrix.service.name }}" == "admin-portal" ]]; then
            ADMIN_URL="$(service_url admin-portal)"
            ADMIN_APP_NAME="$(service_env admin-portal NEXT_PUBLIC_APP_NAME)"
            ADMIN_APP_NAME="${ADMIN_APP_NAME:-wApi Super Admin}"

            BUILD_ARGS+=(
              --build-arg "NEXT_PUBLIC_APP_NAME=${ADMIN_APP_NAME}"
              --build-arg "NEXT_PUBLIC_APP_URL=${ADMIN_URL}"
            )
          fi

          docker buildx build \
            --platform=linux/amd64 \
            -f "${{ matrix.service.dockerfile }}" \
            -t "${DOCKERHUB_IMAGE}:${{ github.sha }}" \
            -t "${DOCKERHUB_IMAGE}:latest" \
            -t "${ARTIFACT_IMAGE}:${{ github.sha }}" \
            -t "${ARTIFACT_IMAGE}:latest" \
            "${BUILD_ARGS[@]}" \
            --push \
            .

      - name: Update Cloud Run service
        if: ${{ github.event_name == 'push' || github.event.inputs.service == 'all' || github.event.inputs.service == matrix.service.name }}
        env:
          IMAGE: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.ARTIFACT_REPOSITORY }}/wapi-${{ matrix.service.name }}:${{ github.sha }}
        run: |
          gcloud run services update "${{ matrix.service.name }}" \
            --project="${PROJECT_ID}" \
            --region="${REGION}" \
            --image="${IMAGE}" \
            --quiet
