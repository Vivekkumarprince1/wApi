# Production-oriented Compose template.
#
# Copy to docker-compose.prod.yml outside source control, provide values from a
# secret manager or an env file that is not committed, then deploy with:
#   docker compose -f docker-compose.prod.yml up -d --build
#
# This template intentionally does not run MongoDB/Redis/EventBus containers. Use
# managed services or private infrastructure for production data stores.

services:
  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    restart: unless-stopped
    ports:
      - "${API_GATEWAY_PORT:-5001}:5001"
    environment:
      NODE_ENV: production
      PORT: 5001
      INTERNAL_SERVICE_SECRET: ${INTERNAL_SERVICE_SECRET:?required}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:?required}
      AUTH_SERVICE_URL: http://auth-service:3006
      CONTACT_SERVICE_URL: http://contact-service:3007
      CHAT_SERVICE_URL: http://chat-service:3008
      SERVICE_PROVIDER_URL: http://service-provider:3004
      AUTOMATION_SERVICE_URL: http://automation-service:3001
      BILLING_SERVICE_URL: http://billing-service:3003
      CAMPAIGN_SERVICE_URL: http://campaign-service:3002
      WEBSOCKET_URL: http://websocket-gateway:3009
      WEBHOOK_INGESTOR_URL: http://webhook-ingestor:3013
      REDIS_URL: ${REDIS_URL:?required}
    depends_on:
      - auth-service
      - contact-service
      - chat-service
      - billing-service
      - campaign-service
      - automation-service
      - service-provider
      - webhook-ingestor
      - websocket-gateway

  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3006
      MONGO_URI: ${MONGO_URI_AUTH:?required}
      REDIS_URL: ${REDIS_URL:?required}
      JWT_SECRET: ${JWT_SECRET:?required}
      INTERNAL_SERVICE_SECRET: ${INTERNAL_SERVICE_SECRET:?required}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:?required}
      NEXT_PUBLIC_APP_URL: ${CUSTOMER_PORTAL_URL:?required}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}

  contact-service:
    build:
      context: .
      dockerfile: services/contact-service/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3007
      MONGO_URI: ${MONGO_URI_CONTACT:?required}
      REDIS_URL: ${REDIS_URL:?required}
      JWT_SECRET: ${JWT_SECRET:?required}
      INTERNAL_SERVICE_SECRET: ${INTERNAL_SERVICE_SECRET:?required}

  chat-service:
    build:
      context: .
      dockerfile: services/chat-service/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3008
      MONGO_URI: ${MONGO_URI_CHAT:?required}
      REDIS_URL: ${REDIS_URL:?required}
      JWT_SECRET: ${JWT_SECRET:?required}
      INTERNAL_SERVICE_SECRET: ${INTERNAL_SERVICE_SECRET:?required}
      BILLING_SERVICE_URL: http://billing-service:3003

  billing-service:
    build:
      context: .
      dockerfile: services/billing-service/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3003
      MONGO_URI: ${MONGO_URI_BILLING:?required}
      REDIS_URL: ${REDIS_URL:?required}
      JWT_SECRET: ${JWT_SECRET:?required}
      INTERNAL_SERVICE_SECRET: ${INTERNAL_SERVICE_SECRET:?required}
      BSP_SERVICE_URL: http://service-provider:3004
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID:?required}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET:?required}
      RAZORPAY_WEBHOOK_SECRET: ${RAZORPAY_WEBHOOK_SECRET:?required}

  campaign-service:
    build:
      context: .
      dockerfile: services/campaign-service/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3002
      MONGO_URI: ${MONGO_URI_CAMPAIGN:?required}
      REDIS_URL: ${REDIS_URL:?required}
      JWT_SECRET: ${JWT_SECRET:?required}
      INTERNAL_SERVICE_SECRET: ${INTERNAL_SERVICE_SECRET:?required}
      BILLING_SERVICE_URL: http://billing-service:3003
      BSP_SERVICE_URL: http://service-provider:3004
      MONOLITH_URL: http://api-gateway:5001

  automation-service:
    build:
      context: .
      dockerfile: services/automation-service/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      MONGO_URI: ${MONGO_URI_AUTOMATION:?required}
      REDIS_URL: ${REDIS_URL:?required}
      JWT_SECRET: ${JWT_SECRET:?required}
      INTERNAL_SERVICE_SECRET: ${INTERNAL_SERVICE_SECRET:?required}
      INTEGRATION_ENCRYPTION_KEY: ${INTEGRATION_ENCRYPTION_KEY:?required}
      MONOLITH_INTERNAL_URL: http://api-gateway:5001
      BSP_SERVICE_URL: http://service-provider:3004

  service-provider:
    build:
      context: .
      dockerfile: services/service-provider/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3004
      MONGO_URI: ${MONGO_URI_BSP:?required}
      REDIS_URL: ${REDIS_URL:?required}
      JWT_SECRET: ${JWT_SECRET:?required}
      INTERNAL_SERVICE_SECRET: ${INTERNAL_SERVICE_SECRET:?required}
      INTEGRATION_ENCRYPTION_KEY: ${INTEGRATION_ENCRYPTION_KEY:?required}
      MAIN_SERVICE_URL: http://api-gateway:5001
      CAMPAIGN_SERVICE_URL: http://campaign-service:3002
      BILLING_SERVICE_URL: http://billing-service:3003
      GUPSHUP_PARTNER_BASE_URL: ${GUPSHUP_PARTNER_BASE_URL:-https://partner.gupshup.io}
      GUPSHUP_API_BASE_URL: ${GUPSHUP_API_BASE_URL:-https://api.gupshup.io}
      GUPSHUP_PARTNER_EMAIL: ${GUPSHUP_PARTNER_EMAIL:?required}
      GUPSHUP_PARTNER_CLIENT_SECRET: ${GUPSHUP_PARTNER_CLIENT_SECRET:?required}
      GUPSHUP_WEBHOOK_SECRET: ${GUPSHUP_WEBHOOK_SECRET:?required}
      WHATSAPP_WEBHOOK_VERIFY_TOKEN: ${WHATSAPP_WEBHOOK_VERIFY_TOKEN:?required}

  webhook-ingestor:
    build:
      context: .
      dockerfile: services/webhook-ingestor/Dockerfile
    restart: unless-stopped
    ports:
      - "${WEBHOOK_INGESTOR_PORT:-3013}:3013"
    environment:
      NODE_ENV: production
      PORT: 3013
      MONGO_URI: ${MONGO_URI_WEBHOOK:?required}
      REDIS_URL: ${REDIS_URL:?required}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:?required}
      INTERNAL_SERVICE_SECRET: ${INTERNAL_SERVICE_SECRET:?required}
      VERIFY_TOKEN: ${VERIFY_TOKEN:?required}

  websocket-gateway:
    build:
      context: .
      dockerfile: services/websocket-gateway/Dockerfile
    restart: unless-stopped
    ports:
      - "${WEBSOCKET_PORT:-3009}:3009"
    environment:
      NODE_ENV: production
      PORT: 3009
      MONGO_URI: ${MONGO_URI_WEBSOCKET:?required}
      REDIS_URL: ${REDIS_URL:?required}
      JWT_SECRET: ${JWT_SECRET:?required}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:?required}

  customer-portal:
    build:
      context: .
      dockerfile: apps/customer-portal/Dockerfile
    restart: unless-stopped
    ports:
      - "${CUSTOMER_PORTAL_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      BACKEND_API_URL: http://api-gateway:5001
      NEXT_PUBLIC_APP_URL: ${CUSTOMER_PORTAL_URL:?required}
      NEXT_PUBLIC_SOCKET_URL: ${PUBLIC_SOCKET_URL:?required}
    depends_on:
      - api-gateway

  admin-portal:
    build:
      context: .
      dockerfile: apps/admin-portal/Dockerfile
    restart: unless-stopped
    ports:
      - "${ADMIN_PORTAL_PORT:-3100}:3100"
    environment:
      NODE_ENV: production
      PORT: 3100
      GATEWAY_URL: http://api-gateway:5001
      BACKEND_API_URL: http://api-gateway:5001
      CUSTOMER_PORTAL_URL: ${CUSTOMER_PORTAL_URL:?required}
      NEXT_PUBLIC_APP_URL: ${ADMIN_PORTAL_URL:?required}
      JWT_SECRET: ${JWT_SECRET:?required}
      INTERNAL_SERVICE_SECRET: ${INTERNAL_SERVICE_SECRET:?required}
    depends_on:
      - api-gateway
