apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: wapi-ingress
  namespace: wapi
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    nginx.ingress.kubernetes.io/use-regex: "true"
spec:
  ingressClassName: nginx
  rules:
    - host: wapi.example.com # Replace with your actual domain
      http:
        paths:
          # API Gateway
          - path: /api(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: api-gateway
                port:
                  number: 5001
          # Admin Portal
          - path: /admin(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: admin-portal
                port:
                  number: 3100
          # Customer Portal / Frontend
          - path: /(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: frontend
                port:
                  number: 3000
