apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: azure-kvname-wapi
  namespace: wapi
spec:
  provider: azure
  secretObjects:
    - secretName: wapi-secrets
      type: Opaque
      data:
        - objectName: jwt-secret
          key: JWT_SECRET
        - objectName: internal-service-secret
          key: INTERNAL_SERVICE_SECRET
        - objectName: mongo-uri
          key: MONGO_URI
        - objectName: redis-url
          key: REDIS_URL
        - objectName: kafka-broker
          key: KAFKA_BROKER
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "true" # Set to true to use the AKS identity
    userAssignedIdentityID: ""   # Populate with the client ID of the user-assigned identity if used
    keyvaultName: "kv-wapi-prod-xy" # Must match the Key Vault name in terraform
    cloudName: ""                # [OPTIONAL for Azure] if not provided, the Azure environment defaults to AzurePublicCloud
    objects: |
      array:
        - |
          objectName: jwt-secret
          objectType: secret
          objectVersion: ""
        - |
          objectName: internal-service-secret
          objectType: secret
          objectVersion: ""
        - |
          objectName: mongo-uri
          objectType: secret
          objectVersion: ""
        - |
          objectName: redis-url
          objectType: secret
          objectVersion: ""
        - |
          objectName: kafka-broker
          objectType: secret
          objectVersion: ""
    tenantId: ""                 # The tenant ID of the Key Vault (will be auto-populated by the CSI driver usually or manually set)
