    matchLabels:
      app: webhook-ingestor
  template:
    metadata:
      labels:
        app: webhook-ingestor
    spec:
      containers:
        - name: webhook-ingestor
          image: acrswapiprod.azurecr.io/webhook-ingestor:latest
          ports:
            - containerPort: 3013
          env:
            - name: PORT
              value: "3013"
            - name: VERIFY_TOKEN
              value: "wapi-verify-token"
            - name: WEBHOOK_SECRET # Should ideally be in KV
              value: "dev-webhook-secret-change-me"
            - name: INTERNAL_SERVICE_SECRET
              valueFrom:
                secretKeyRef:
                  name: wapi-secrets
                  key: INTERNAL_SERVICE_SECRET
            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: wapi-secrets
                  key: MONGO_URI
            - name: KAFKA_BROKER
