# --- API Gateway ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: wapi
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: acrswapiprod.azurecr.io/api-gateway:latest
          ports:
            - containerPort: 5001
          env:
            - name: PORT
              value: "5001"
            - name: ALLOWED_ORIGINS
              value: "https://wapi.example.com"
            - name: AUTH_SERVICE_URL
              value: "http://auth-service:3006"
            - name: CONTACT_SERVICE_URL
              value: "http://contact-service:3007"
            - name: CHAT_SERVICE_URL
              value: "http://chat-service:3008"
            - name: SERVICE_PROVIDER_URL
              value: "http://service-provider:3004"
            - name: AUTOMATION_SERVICE_URL
              value: "http://automation-service:3001"
            - name: BILLING_SERVICE_URL
              value: "http://billing-service:3003"
            - name: CAMPAIGN_SERVICE_URL
              value: "http://campaign-service:3002"
            - name: WEBSOCKET_URL
              value: "http://websocket-gateway:3009"
            - name: WEBHOOK_INGESTOR_URL
              value: "http://webhook-ingestor:3013"
            - name: INTERNAL_SERVICE_SECRET
              valueFrom:
                secretKeyRef:
                  name: wapi-secrets
                  key: INTERNAL_SERVICE_SECRET
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: wapi-secrets
                  key: REDIS_URL
          volumeMounts:
            - name: secrets-store-inline
              mountPath: "/mnt/secrets-store"
              readOnly: true
      volumes:
        - name: secrets-store-inline
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: "azure-kvname-wapi"
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: wapi
spec:
  selector:
    app: api-gateway
  ports:
    - protocol: TCP
      port: 5001
      targetPort: 5001

