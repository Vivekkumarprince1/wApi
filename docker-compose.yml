services:
  # --- Infrastructure Services ---
  mongodb:
    image: mongo:6.0
    container_name: connectsphere-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - connectsphere-network

  redis:
    image: redis:7-alpine
    container_name: connectsphere-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - connectsphere-network


  # --- Microservices ---
  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    container_name: connectsphere-api-gateway
    ports:
      - "5001:5001"
    depends_on:
      - mongodb
      - redis
    environment:
      - NODE_ENV=development
      - PORT=5001
      - INTERNAL_SERVICE_SECRET=replace-with-generated-internal-service-secret
      - ALLOWED_ORIGINS=http://localhost:3000,http://localhost:3100,http://127.0.0.1:3000,http://127.0.0.1:3100
      - AUTH_SERVICE_URL=http://auth-service:3006
      - CONTACT_SERVICE_URL=http://contact-service:3007
      - CHAT_SERVICE_URL=http://chat-service:3008
      - SERVICE_PROVIDER_URL=http://service-provider:3004
      - AUTOMATION_SERVICE_URL=http://automation-service:3001
      - BILLING_SERVICE_URL=http://billing-service:3003
      - CAMPAIGN_SERVICE_URL=http://campaign-service:3002
      - WEBSOCKET_URL=http://websocket-gateway:3009
      - WEBHOOK_INGESTOR_URL=http://webhook-ingestor:3013
      - REDIS_URL=redis://redis:6379
    networks:
      - connectsphere-network

  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    container_name: connectsphere-auth-service
    env_file:
      - ./services/auth-service/.env
    ports:
      - "3006:3006"
    depends_on:
      - mongodb
      - redis
    environment:
      - PORT=3006
      - JWT_SECRET=replace-with-generated-jwt-secret
      - INTERNAL_SERVICE_SECRET=replace-with-generated-internal-service-secret
      - MONGO_URI=mongodb://mongodb:27017/connectsphere
      - REDIS_URL=redis://redis:6379
      - ALLOWED_ORIGINS=http://localhost:3000,http://localhost:3100,http://127.0.0.1:3000,http://127.0.0.1:3100
    networks:
      - connectsphere-network

  campaign-service:
    build:
      context: .
      dockerfile: services/campaign-service/Dockerfile
    container_name: connectsphere-campaign-service
    ports:
      - "3002:3002"
    depends_on:
      - mongodb
      - redis
    environment:
      - PORT=3002
      - JWT_SECRET=replace-with-generated-jwt-secret
      - INTERNAL_SERVICE_SECRET=replace-with-generated-internal-service-secret
      - MONGO_URI=mongodb://mongodb:27017/connectsphere_campaign
      - REDIS_URL=redis://redis:6379
      - ENABLE_BACKGROUND_WORKERS=true
    networks:
      - connectsphere-network

  billing-service:
    build:
      context: .
      dockerfile: services/billing-service/Dockerfile
    container_name: connectsphere-billing-service
    ports:
      - "3003:3003"
    depends_on:
      - mongodb
      - redis
    environment:
      - PORT=3003
      - JWT_SECRET=replace-with-generated-jwt-secret
      - INTERNAL_SERVICE_SECRET=replace-with-generated-internal-service-secret
      - MONGO_URI=mongodb://mongodb:27017/connectsphere_billing
      - REDIS_URL=redis://redis:6379
      - ENABLE_BACKGROUND_WORKERS=true
    networks:
      - connectsphere-network

  service-provider:
    build:
      context: .
      dockerfile: services/service-provider/Dockerfile
    container_name: connectsphere-service-provider
    ports:
      - "3004:3004"
    depends_on:
      - mongodb
      - redis
    environment:
      - PORT=3004
      - JWT_SECRET=replace-with-generated-jwt-secret
      - INTERNAL_SERVICE_SECRET=replace-with-generated-internal-service-secret
      - INTEGRATION_ENCRYPTION_KEY=replace-with-generated-integration-encryption-key
      - MONGO_URI=mongodb://mongodb:27017/connectsphere_bsp
      - REDIS_URL=redis://redis:6379
      - MAIN_SERVICE_URL=http://api-gateway:5001
    networks:
      - connectsphere-network

  automation-service:
    build:
      context: .
      dockerfile: services/automation-service/Dockerfile
    container_name: connectsphere-automation-service
    ports:
      - "3001:3001"
    depends_on:
      - mongodb
      - redis
    environment:
      - PORT=3001
      - JWT_SECRET=replace-with-generated-jwt-secret
      - INTERNAL_SERVICE_SECRET=replace-with-generated-internal-service-secret
      - INTEGRATION_ENCRYPTION_KEY=replace-with-generated-integration-encryption-key
      - MONGO_URI=mongodb://mongodb:27017/connectsphere_automation
      - REDIS_URL=redis://redis:6379
    networks:
      - connectsphere-network

  chat-service:
    build:
      context: .
      dockerfile: services/chat-service/Dockerfile
    container_name: connectsphere-chat-service
    ports:
      - "3008:3008"
    depends_on:
      - mongodb
      - redis
    environment:
      - PORT=3008
      - JWT_SECRET=replace-with-generated-jwt-secret
      - INTERNAL_SERVICE_SECRET=replace-with-generated-internal-service-secret
      - MONGO_URI=mongodb://mongodb:27017/connectsphere
      - REDIS_URL=redis://redis:6379
    networks:
      - connectsphere-network

  contact-service:
    build:
      context: .
      dockerfile: services/contact-service/Dockerfile
    container_name: connectsphere-contact-service
    ports:
      - "3007:3007"
    depends_on:
      - mongodb
      - redis
    environment:
      - PORT=3007
      - JWT_SECRET=replace-with-generated-jwt-secret
      - INTERNAL_SERVICE_SECRET=replace-with-generated-internal-service-secret
      - MONGO_URI=mongodb://mongodb:27017/connectsphere
      - REDIS_URL=redis://redis:6379
    networks:
      - connectsphere-network

  webhook-ingestor:
    build:
      context: .
      dockerfile: services/webhook-ingestor/Dockerfile
    container_name: connectsphere-webhook-ingestor
    ports:
      - "3013:3013"
    depends_on:
      - mongodb
      - redis
    environment:
      - PORT=3013
      - WEBHOOK_SECRET=dev-webhook-secret-change-me
      - INTERNAL_SERVICE_SECRET=replace-with-generated-internal-service-secret
      - MONGO_URI=mongodb://mongodb:27017/connectsphere
      - REDIS_URL=redis://redis:6379
      - VERIFY_TOKEN=connectsphere-verify-token
    networks:
      - connectsphere-network

  websocket-gateway:
    build:
      context: .
      dockerfile: services/websocket-gateway/Dockerfile
    container_name: connectsphere-websocket-gateway
    ports:
      - "3009:3009"
    depends_on:
      - mongodb
      - redis
    environment:
      - PORT=3009
      - JWT_SECRET=replace-with-generated-jwt-secret
      - MONGO_URI=mongodb://mongodb:27017/connectsphere
      - REDIS_URL=redis://redis:6379
      - AUTH_SERVICE_URL=http://auth-service:3006
      - ALLOWED_ORIGINS=http://localhost:3000,http://localhost:3100,http://127.0.0.1:3000,http://127.0.0.1:3100
    networks:
      - connectsphere-network

  # --- Frontend / Portals ---
  admin-portal:
    build:
      context: .
      dockerfile: apps/admin-portal/Dockerfile
    container_name: connectsphere-admin-portal
    ports:
      - "3100:3100"
    depends_on:
      - api-gateway
    environment:
      - PORT=3100
      - BACKEND_API_URL=http://api-gateway:5001
    networks:
      - connectsphere-network

  career-portal:
    build:
      context: .
      dockerfile: apps/career-portal/Dockerfile
      args:
        APP_URL: http://localhost:3001
        BETTER_AUTH_URL: http://localhost:3001
    container_name: connectsphere-career-portal
    ports:
      - "3001:3001"
    depends_on:
      - mongodb
    environment:
      - NODE_ENV=production
      - PORT=3001
      - MONGODB_URI=mongodb://mongodb:27017/connectsphere
      - BETTER_AUTH_SECRET=${CAREER_BETTER_AUTH_SECRET:-connectsphere-local-career-secret-change-me-000000}
      - BETTER_AUTH_URL=http://localhost:3001
      - APP_URL=http://localhost:3001
    networks:
      - connectsphere-network

  customer-portal:
    build:
      context: .
      dockerfile: apps/customer-portal/Dockerfile
      args:
        BACKEND_API_URL: http://api-gateway:5001
        NEXT_PUBLIC_API_URL: /api
        NEXT_PUBLIC_SOCKET_URL: ""
    container_name: connectsphere-customer-portal
    ports:
      - "3000:3000"
    depends_on:
      - api-gateway
    environment:
      - PORT=3000
      - BACKEND_API_URL=http://api-gateway:5001
    networks:
      - connectsphere-network

networks:
  connectsphere-network:
    driver: bridge

volumes:
  mongodb_data:
  redis_data:
