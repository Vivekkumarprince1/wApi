apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: connectsphere-production
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Vivekkumarprince1/connectsphere-gitops.git
    targetRevision: main
    path: environments/production/connectsphere
    helm:
      releaseName: connectsphere
      valueFiles:
        - production-values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: connectsphere
  revisionHistoryLimit: 10
  # HPA owns replicas for autoscaled workloads. Ignoring only those fields
  # prevents normal scaling from leaving the application permanently OutOfSync.
  ignoreDifferences:
    - group: apps
      kind: Deployment
      name: connectsphere-api-gateway
      jsonPointers:
        - /spec/replicas
    - group: apps
      kind: Deployment
      name: connectsphere-auth-service
      jsonPointers:
        - /spec/replicas
    - group: apps
      kind: Deployment
      name: connectsphere-chat-service
      jsonPointers:
        - /spec/replicas
    - group: apps
      kind: Deployment
      name: connectsphere-webhook-ingestor
      jsonPointers:
        - /spec/replicas
    - group: apps
      kind: Deployment
      name: connectsphere-websocket-gateway
      jsonPointers:
        - /spec/replicas
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
      - ApplyOutOfSyncOnly=true
