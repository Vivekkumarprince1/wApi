apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: connectsphere-production
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Vivekkumarprince1/connectsphere-gitops.git
    targetRevision: main
    path: environments/production/connectsphere
    helm:
      releaseName: connectsphere
      valueFiles:
        - production-values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: connectsphere
  revisionHistoryLimit: 10
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
      - ApplyOutOfSyncOnly=true
