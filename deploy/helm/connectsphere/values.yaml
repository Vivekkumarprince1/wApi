        cpu: 100m
        memory: 384Mi
      limits:
        cpu: 750m
        memory: 1Gi

probes:
  enabled: true
  path: /health
  initialDelaySeconds: 20
  periodSeconds: 15
  timeoutSeconds: 3
  failureThreshold: 5
