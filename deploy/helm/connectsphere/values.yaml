global:
  terminationGracePeriodSeconds: 60
  topologySpread:
    zones:
      enabled: false
      maxSkew: 1
      whenUnsatisfiable: DoNotSchedule
    hosts:
      enabled: true
      whenUnsatisfiable: ScheduleAnyway
  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 75
    scaleUp:
      stabilizationWindowSeconds: 0
      maxChangePercent: 100
    scaleDown:
      stabilizationWindowSeconds: 300
      maxChangePercent: 25
  pdb:
    enabled: false
    minAvailable: 1
  image:
    registry: changeme.azurecr.io
    repositoryPrefix: connectsphere
    tag: latest
    pullPolicy: IfNotPresent
  labels: {}
  podAnnotations: {}

config:
  create: true
  name: connectsphere-config
  data:
    NODE_ENV: production
    APP_ENV: production
    RELEASE_VERSION: v1.0.0
    ENABLE_BACKGROUND_WORKERS: "true"
    FEATURE_COMMERCE: "false"
    FEATURE_AI_FAQ: "false"
    FEATURE_META_ADS: "false"
    FEATURE_INSTAGRAM: "false"
    FEATURE_PETPOOJA: "false"
    FEATURE_ADVANCED_ANSWERBOT: "false"
    FEATURE_DEVELOPER_API: "false"
    FEATURE_FORMS: "false"
    NEXT_PUBLIC_FEATURE_COMMERCE: "false"
    NEXT_PUBLIC_FEATURE_AI_FAQ: "false"
    NEXT_PUBLIC_FEATURE_META_ADS: "false"
    NEXT_PUBLIC_FEATURE_INSTAGRAM: "false"
    NEXT_PUBLIC_FEATURE_PETPOOJA: "false"
    NEXT_PUBLIC_FEATURE_ADVANCED_ANSWERBOT: "false"
    NEXT_PUBLIC_FEATURE_DEVELOPER_API: "false"
    NEXT_PUBLIC_FEATURE_FORMS: "false"
    ALLOWED_ORIGINS: https://connectsphere-customer-vivek.eastus.cloudapp.azure.com,https://connectsphere-admin-vivek.eastus.cloudapp.azure.com,https://connectsphere-career-vivek.eastus.cloudapp.azure.com
    NEXT_PUBLIC_APP_NAME: ConnectSphere
    NEXT_PUBLIC_APP_URL: https://connectsphere-customer-vivek.eastus.cloudapp.azure.com
    NEXT_PUBLIC_API_URL: /api
    NEXT_PUBLIC_SOCKET_URL: https://connectsphere-api-vivek.eastus.cloudapp.azure.com
    CUSTOMER_PORTAL_URL: https://connectsphere-customer-vivek.eastus.cloudapp.azure.com
    CUSTOMER_PORTAL_HEALTH_URL: http://connectsphere-customer-portal:3000
    ADMIN_PORTAL_URL: https://connectsphere-admin-vivek.eastus.cloudapp.azure.com
    CAREER_PORTAL_URL: https://connectsphere-career-vivek.eastus.cloudapp.azure.com
    CAREER_PORTAL_HEALTH_URL: http://connectsphere-career-portal:3001/api/health/live
    GATEWAY_URL: http://connectsphere-api-gateway:5001
    API_GATEWAY_URL: http://connectsphere-api-gateway:5001
    AUTH_SERVICE_URL: http://connectsphere-auth-service:3006
    CONTACT_SERVICE_URL: http://connectsphere-contact-service:3007
    CHAT_SERVICE_URL: http://connectsphere-chat-service:3008
    SERVICE_PROVIDER_URL: http://connectsphere-service-provider:3004
    BSP_SERVICE_URL: http://connectsphere-service-provider:3004
    AUTOMATION_SERVICE_URL: http://connectsphere-automation-service:3001
    BILLING_SERVICE_URL: http://connectsphere-billing-service:3003
    CAMPAIGN_SERVICE_URL: http://connectsphere-campaign-service:3002
    WEBSOCKET_URL: http://connectsphere-websocket-gateway:3009
    WEBHOOK_INGESTOR_URL: http://connectsphere-webhook-ingestor:3013

secret:
  create: false
  name: connectsphere-secrets
  stringData: {}

keyVaultSecrets:
  enabled: false
  name: connectsphere-keyvault-secrets
  provider: azure
  keyVaultName: ""
  tenantId: ""
  usePodIdentity: "false"
  useVMManagedIdentity: "true"
  userAssignedIdentityID: ""
  cloudName: ""
  syncSecret:
    enabled: true
    name: connectsphere-secrets
    type: Opaque
  syncPod:
    enabled: true
    image: registry.k8s.io/pause:3.10
  objects: []

imagePullSecrets: []

serviceAccount:
  create: true
  name: ""
  annotations: {}

ingress:
  enabled: false
  className: nginx
  annotations: {}
  tls: []
  hosts:
    - host: app.example.com
      service: customer-portal
      path: /
      pathType: Prefix
    - host: admin.example.com
      service: admin-portal
      path: /
      pathType: Prefix
    - host: careers.example.com
      service: career-portal
      path: /
      pathType: Prefix
    - host: api.example.com
      service: api-gateway
      path: /
      pathType: Prefix

publicServices:
  enabled: false
  annotations: {}
  items:
    - name: customer-portal-public
      service: customer-portal
      port: 80
      targetPort: 3000
      annotations: {}
    - name: admin-portal-public
      service: admin-portal
      port: 80
      targetPort: 3100
      annotations: {}
    - name: career-portal-public
      service: career-portal
      port: 80
      targetPort: 3001
      annotations: {}

# Ingress isolation is enabled only after the ingress-controller namespace
# label has been verified in the target cluster. Egress remains unrestricted:
# workloads require private data-plane and third-party provider access.
networkPolicy:
  enabled: false
  ingressControllerNamespaceLabel: kubernetes.io/metadata.name
  ingressControllerNamespace: ingress-nginx

apiGatewayProxy:
  enabled: false
  host: ""
  email: ""
  image: caddy:2.9-alpine
  upstream: connectsphere-api-gateway:5001
  storage:
    enabled: true
    size: 1Gi
    storageClassName: ""
  service:
    annotations: {}

careerPortalProxy:
  enabled: false
  host: ""
  email: ""
  image: caddy:2.9-alpine
  upstream: connectsphere-career-portal:3001
  storage:
    enabled: true
    size: 1Gi
    storageClassName: ""
  service:
    annotations: {}

services:
  api-gateway:
    enabled: true
    image:
      repository: api-gateway
    replicas: 2
    containerPort: 5001
    servicePort: 5001
    readinessPath: /readiness
    env:
      PORT: "5001"
      ALLOWED_ORIGINS: http://connectsphere-customer-vivek.eastus.cloudapp.azure.com,https://connectsphere-customer-vivek.eastus.cloudapp.azure.com,http://connectsphere-admin-vivek.eastus.cloudapp.azure.com,https://connectsphere-admin-vivek.eastus.cloudapp.azure.com
      SERVICE_NAME: api-gateway
    secretEnv:
      INTERNAL_SERVICE_SECRET: INTERNAL_SERVICE_SECRET
      REDIS_URL: REDIS_URL
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 768Mi
    autoscaling:
      enabled: false
      minReplicas: 2
      maxReplicas: 10
      targetCPUUtilizationPercentage: 70
      targetMemoryUtilizationPercentage: 75
      scaleUp:
        stabilizationWindowSeconds: 0
        maxChangePercent: 100
      scaleDown:
        stabilizationWindowSeconds: 300
        maxChangePercent: 25
    pdb:
      enabled: true
      minAvailable: 1

  auth-service:
    enabled: true
    image:
      repository: auth-service
    replicas: 2
    containerPort: 3006
    servicePort: 3006
    readinessPath: /readiness
    env:
      PORT: "3006"
      SERVICE_NAME: auth-service
    secretEnv:
      MONGO_URI: MONGO_URI_AUTH
      JWT_SECRET: JWT_SECRET
      INTERNAL_SERVICE_SECRET: INTERNAL_SERVICE_SECRET
      REDIS_URL: REDIS_URL
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 768Mi

  campaign-service:
    enabled: true
    image:
      repository: campaign-service
    replicas: 1
    containerPort: 3002
    servicePort: 3002
    readinessPath: /readiness
    env:
      PORT: "3002"
      SERVICE_NAME: campaign-service
    secretEnv:
      MONGO_URI: MONGO_URI_CAMPAIGN
      JWT_SECRET: JWT_SECRET
      INTERNAL_SERVICE_SECRET: INTERNAL_SERVICE_SECRET
      REDIS_URL: REDIS_URL
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 768Mi

  billing-service:
