global:
  image:
    registry: changeme.azurecr.io
    repositoryPrefix: connectsphere
    tag: latest
    pullPolicy: IfNotPresent
  labels: {}
  podAnnotations: {}

config:
  create: true
  name: connectsphere-config
  data:
    NODE_ENV: production
    ALLOWED_ORIGINS: http://connectsphere-customer-vivek.eastus.cloudapp.azure.com,http://connectsphere-admin-vivek.eastus.cloudapp.azure.com
    NEXT_PUBLIC_APP_NAME: ConnectSphere
    NEXT_PUBLIC_APP_URL: http://connectsphere-customer-vivek.eastus.cloudapp.azure.com
    NEXT_PUBLIC_API_URL: /api
    NEXT_PUBLIC_SOCKET_URL: https://connectsphere-api-vivek.eastus.cloudapp.azure.com
    CUSTOMER_PORTAL_URL: http://connectsphere-customer-vivek.eastus.cloudapp.azure.com
    CUSTOMER_PORTAL_HEALTH_URL: http://connectsphere-customer-portal:3000
    ADMIN_PORTAL_URL: http://connectsphere-admin-vivek.eastus.cloudapp.azure.com
    GATEWAY_URL: http://connectsphere-api-gateway:5001
    API_GATEWAY_URL: http://connectsphere-api-gateway:5001
    AUTH_SERVICE_URL: http://connectsphere-auth-service:3006
    CONTACT_SERVICE_URL: http://connectsphere-contact-service:3007
    CHAT_SERVICE_URL: http://connectsphere-chat-service:3008
    SERVICE_PROVIDER_URL: http://connectsphere-service-provider:3004
    BSP_SERVICE_URL: http://connectsphere-service-provider:3004
    AUTOMATION_SERVICE_URL: http://connectsphere-automation-service:3001
    BILLING_SERVICE_URL: http://connectsphere-billing-service:3003
    CAMPAIGN_SERVICE_URL: http://connectsphere-campaign-service:3002
    WEBSOCKET_URL: http://connectsphere-websocket-gateway:3009
    WEBHOOK_INGESTOR_URL: http://connectsphere-webhook-ingestor:3013

secret:
  create: false
  name: connectsphere-secrets
  stringData: {}

keyVaultSecrets:
  enabled: false
  name: connectsphere-keyvault-secrets
  provider: azure
  keyVaultName: ""
  tenantId: ""
  usePodIdentity: "false"
  useVMManagedIdentity: "true"
  userAssignedIdentityID: ""
  cloudName: ""
  syncSecret:
    enabled: true
    name: connectsphere-secrets
    type: Opaque
  syncPod:
    enabled: true
    image: registry.k8s.io/pause:3.10
  objects: []

imagePullSecrets: []

serviceAccount:
  create: true
  name: ""
  annotations: {}

ingress:
  enabled: false
  className: nginx
  annotations: {}
  tls: []
  hosts:
    - host: app.example.com
      service: customer-portal
      path: /
      pathType: Prefix
    - host: admin.example.com
      service: admin-portal
      path: /
      pathType: Prefix
    - host: api.example.com
      service: api-gateway
      path: /
      pathType: Prefix

publicServices:
  enabled: false
  annotations: {}
  items:
    - name: customer-portal-public
      service: customer-portal
      port: 80
      targetPort: 3000
      annotations: {}
    - name: admin-portal-public
      service: admin-portal
      port: 80
      targetPort: 3100
      annotations: {}

apiGatewayProxy:
  enabled: false
  host: ""
  email: ""
  image: caddy:2.9-alpine
  upstream: connectsphere-api-gateway:5001
  storage:
    enabled: true
    size: 1Gi
    storageClassName: ""
  service:
    annotations: {}

services:
  api-gateway:
    enabled: true
    image:
      repository: api-gateway
    replicas: 2
    containerPort: 5001
    servicePort: 5001
    env:
      PORT: "5001"
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 768Mi

  auth-service:
    enabled: true
    image:
      repository: auth-service
    replicas: 2
    containerPort: 3006
    servicePort: 3006
    env:
      PORT: "3006"
    secretEnv:
      MONGO_URI: MONGO_URI_AUTH
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 768Mi

  campaign-service:
    enabled: true
    image:
      repository: campaign-service
    replicas: 1
    containerPort: 3002
    servicePort: 3002
    env:
      PORT: "3002"
    secretEnv:
      MONGO_URI: MONGO_URI_CAMPAIGN
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 768Mi

  billing-service:
    enabled: true
    image:
      repository: billing-service
    replicas: 1
    containerPort: 3003
    servicePort: 3003
    env:
      PORT: "3003"
    secretEnv:
      MONGO_URI: MONGO_URI_BILLING
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 768Mi

  service-provider:
    enabled: true
    image:
      repository: service-provider
    replicas: 1
    containerPort: 3004
    servicePort: 3004
    env:
      PORT: "3004"
    secretEnv:
      MONGO_URI: MONGO_URI_BSP
    resources:
      requests:
        cpu: 150m
        memory: 384Mi
      limits:
        cpu: 750m
        memory: 1Gi

  automation-service:
    enabled: true
    image:
      repository: automation-service
    replicas: 1
    containerPort: 3001
    servicePort: 3001
    env:
      PORT: "3001"
    secretEnv:
      MONGO_URI: MONGO_URI_AUTOMATION
    resources:
      requests:
        cpu: 150m
        memory: 384Mi
      limits:
        cpu: 750m
        memory: 1Gi

  chat-service:
    enabled: true
    image:
      repository: chat-service
    replicas: 2
    containerPort: 3008
    servicePort: 3008
    env:
      PORT: "3008"
    secretEnv:
      MONGO_URI: MONGO_URI_CHAT
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 768Mi

  contact-service:
    enabled: true
    image:
      repository: contact-service
    replicas: 1
    containerPort: 3007
    servicePort: 3007
    env:
      PORT: "3007"
    secretEnv:
      MONGO_URI: MONGO_URI_CONTACT
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 768Mi

  webhook-ingestor:
    enabled: true
    image:
      repository: webhook-ingestor
    replicas: 2
    containerPort: 3013
    servicePort: 3013
    env:
      PORT: "3013"
    secretEnv:
      MONGO_URI: MONGO_URI_WEBHOOK
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 768Mi

  websocket-gateway:
    enabled: true
    image:
      repository: websocket-gateway
    replicas: 2
    containerPort: 3009
    servicePort: 3009
    env:
      PORT: "3009"
    secretEnv:
      MONGO_URI: MONGO_URI_WEBSOCKET
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 768Mi

  admin-portal:
    enabled: true
    image:
      repository: admin-portal
    replicas: 2
    containerPort: 3100
    servicePort: 3100
    env:
      PORT: "3100"
      BACKEND_API_URL: http://connectsphere-api-gateway:5001
    secretEnv:
      MONGODB_URI: MONGODB_URI
      MONGODB_URI_BILLING: MONGODB_URI_BILLING
      MONGODB_URI_CAMPAIGN: MONGODB_URI_CAMPAIGN
      MONGODB_URI_AUTOMATION: MONGODB_URI_AUTOMATION
    resources:
      requests:
        cpu: 100m
        memory: 384Mi
      limits:
        cpu: 750m
        memory: 1Gi

  customer-portal:
    enabled: true
    image:
      repository: customer-portal
    replicas: 2
    containerPort: 3000
    servicePort: 3000
    env:
      PORT: "3000"
      BACKEND_API_URL: http://connectsphere-api-gateway:5001
    resources:
      requests:
        cpu: 100m
        memory: 384Mi
      limits:
        cpu: 750m
        memory: 1Gi

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

probes:
  enabled: true
  path: /health
  initialDelaySeconds: 20
  periodSeconds: 15
  timeoutSeconds: 3
  failureThreshold: 5
