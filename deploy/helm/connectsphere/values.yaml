    secretEnv:
      MONGO_URI: MONGO_URI_BILLING
      JWT_SECRET: JWT_SECRET
      INTERNAL_SERVICE_SECRET: INTERNAL_SERVICE_SECRET
      REDIS_URL: REDIS_URL
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 768Mi

  service-provider:
    enabled: true
    image:
      repository: service-provider
    replicas: 1
    containerPort: 3004
    servicePort: 3004
    readinessPath: /readiness
    env:
      PORT: "3004"
      SERVICE_NAME: service-provider
    secretEnv:
      MONGO_URI: MONGO_URI_BSP
      JWT_SECRET: JWT_SECRET
      INTERNAL_SERVICE_SECRET: INTERNAL_SERVICE_SECRET
      INTEGRATION_ENCRYPTION_KEY: INTEGRATION_ENCRYPTION_KEY
      REDIS_URL: REDIS_URL
      GUPSHUP_PARTNER_CLIENT_SECRET: GUPSHUP_PARTNER_CLIENT_SECRET
      GUPSHUP_PARTNER_EMAIL: GUPSHUP_PARTNER_EMAIL
      GUPSHUP_PARTNER_PASSWORD: GUPSHUP_PARTNER_PASSWORD
