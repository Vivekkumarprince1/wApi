{{- if .Values.networkPolicy.enabled }}
---
# Default-deny unsolicited ingress. Internal application traffic and traffic
# from the configured ingress-controller namespace are explicitly allowed below.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "connectsphere.fullname" . }}-default-deny-ingress
  labels:
    {{- include "connectsphere.labels" . | nindent 4 }}
spec:
  podSelector: {}
  policyTypes:
    - Ingress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "connectsphere.fullname" . }}-allow-application-ingress
  labels:
    {{- include "connectsphere.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: {{ include "connectsphere.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  policyTypes:
    - Ingress
  ingress:
    # Services in this namespace communicate through ClusterIP only.
    - from:
        - podSelector: {}
    # The label is configurable because ingress-controller namespaces differ.
    - from:
        - namespaceSelector:
            matchLabels:
              {{ .Values.networkPolicy.ingressControllerNamespaceLabel }}: {{ .Values.networkPolicy.ingressControllerNamespace }}
{{- end }}