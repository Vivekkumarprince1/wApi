{{- if .Values.apiGatewayProxy.enabled -}}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $.Release.Name }}-api-proxy-caddyfile
  labels:
    {{- include "connectsphere.labels" $ | nindent 4 }}
    app.kubernetes.io/component: api-gateway-proxy
data:
  Caddyfile: |
    {
      email {{ .Values.apiGatewayProxy.email }}
    }

    {{ .Values.apiGatewayProxy.host }} {
      encode gzip
      reverse_proxy {{ .Values.apiGatewayProxy.upstream }}
    }
{{- if .Values.apiGatewayProxy.storage.enabled }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ $.Release.Name }}-api-proxy-caddy-data
  labels:
    {{- include "connectsphere.labels" $ | nindent 4 }}
    app.kubernetes.io/component: api-gateway-proxy
spec:
  accessModes:
    - ReadWriteOnce
  {{- if .Values.apiGatewayProxy.storage.storageClassName }}
  storageClassName: {{ .Values.apiGatewayProxy.storage.storageClassName | quote }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.apiGatewayProxy.storage.size | quote }}
{{- end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $.Release.Name }}-api-proxy
  labels:
    {{- include "connectsphere.labels" $ | nindent 4 }}
    app.kubernetes.io/component: api-gateway-proxy
spec:
  replicas: 1
  # The certificate store is a ReadWriteOnce PVC. Recreate avoids a rolling
  # update deadlock where old and new pods both try to attach the same volume.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "connectsphere.selectorLabels" $ | nindent 6 }}
      app.kubernetes.io/component: api-gateway-proxy
  template:
    metadata:
      labels:
        {{- include "connectsphere.selectorLabels" $ | nindent 8 }}
        app.kubernetes.io/component: api-gateway-proxy
    spec:
      serviceAccountName: {{ include "connectsphere.serviceAccountName" $ }}
      containers:
        - name: caddy
          image: {{ .Values.apiGatewayProxy.image | quote }}
          ports:
            - name: http
              containerPort: 80
            - name: https
              containerPort: 443
          volumeMounts:
            - name: caddyfile
              mountPath: /etc/caddy/Caddyfile
              subPath: Caddyfile
            - name: caddy-data
              mountPath: /data
            - name: caddy-config
              mountPath: /config
      volumes:
        - name: caddyfile
          configMap:
            name: {{ $.Release.Name }}-api-proxy-caddyfile
        - name: caddy-data
          {{- if .Values.apiGatewayProxy.storage.enabled }}
          persistentVolumeClaim:
            claimName: {{ $.Release.Name }}-api-proxy-caddy-data
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: caddy-config
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $.Release.Name }}-api-gateway-public
  labels:
    {{- include "connectsphere.labels" $ | nindent 4 }}
    app.kubernetes.io/component: api-gateway-public
  {{- with .Values.apiGatewayProxy.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: LoadBalancer
  selector:
    {{- include "connectsphere.selectorLabels" $ | nindent 4 }}
    app.kubernetes.io/component: api-gateway-proxy
  ports:
    - name: http
      port: 80
      targetPort: 80
    - name: https
      port: 443
      targetPort: 443
{{- end }}
