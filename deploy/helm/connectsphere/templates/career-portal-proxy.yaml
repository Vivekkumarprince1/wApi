{{- if .Values.careerPortalProxy.enabled -}}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-career-proxy-caddyfile
  labels:
    {{- include "connectsphere.labels" . | nindent 4 }}
    app.kubernetes.io/component: career-portal-proxy
data:
  Caddyfile: |
    {
      email {{ .Values.careerPortalProxy.email }}
    }

    {{ .Values.careerPortalProxy.host }} {
      encode gzip
      reverse_proxy {{ .Values.careerPortalProxy.upstream }}
    }
{{- if .Values.careerPortalProxy.storage.enabled }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ .Release.Name }}-career-proxy-caddy-data
  labels:
    {{- include "connectsphere.labels" . | nindent 4 }}
    app.kubernetes.io/component: career-portal-proxy
spec:
  accessModes: ["ReadWriteOnce"]
  {{- if .Values.careerPortalProxy.storage.storageClassName }}
  storageClassName: {{ .Values.careerPortalProxy.storage.storageClassName | quote }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.careerPortalProxy.storage.size | quote }}
{{- end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-career-proxy
  labels:
    {{- include "connectsphere.labels" . | nindent 4 }}
    app.kubernetes.io/component: career-portal-proxy
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "connectsphere.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: career-portal-proxy
  template:
    metadata:
      labels:
        {{- include "connectsphere.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: career-portal-proxy
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: caddy
          image: {{ .Values.careerPortalProxy.image | quote }}
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
              add: ["NET_BIND_SERVICE"]
          ports:
            - { name: http, containerPort: 80 }
            - { name: https, containerPort: 443 }
          readinessProbe:
            tcpSocket: { port: https }
            periodSeconds: 10
          livenessProbe:
            tcpSocket: { port: http }
            periodSeconds: 15
          resources:
            requests: { cpu: 50m, memory: 64Mi }
            limits: { cpu: 250m, memory: 256Mi }
          volumeMounts:
            - { name: caddyfile, mountPath: /etc/caddy/Caddyfile, subPath: Caddyfile }
            - { name: caddy-data, mountPath: /data }
            - { name: caddy-config, mountPath: /config }
      volumes:
        - name: caddyfile
          configMap: { name: {{ .Release.Name }}-career-proxy-caddyfile }
        - name: caddy-data
          {{- if .Values.careerPortalProxy.storage.enabled }}
          persistentVolumeClaim: { claimName: {{ .Release.Name }}-career-proxy-caddy-data }
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: caddy-config
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-career-portal-public
  labels:
    {{- include "connectsphere.labels" . | nindent 4 }}
    app.kubernetes.io/component: career-portal-public
  {{- with .Values.careerPortalProxy.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: LoadBalancer
  selector:
    {{- include "connectsphere.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: career-portal-proxy
  ports:
    - { name: http, port: 80, targetPort: 80 }
    - { name: https, port: 443, targetPort: 443 }
{{- end }}
