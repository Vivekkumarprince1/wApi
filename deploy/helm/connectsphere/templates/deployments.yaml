{{- range $name, $service := .Values.services }}
{{- if $service.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $.Release.Name }}-{{ $name }}
  labels:
    {{- include "connectsphere.labels" $ | nindent 4 }}
    app.kubernetes.io/component: {{ $name }}
spec:
  replicas: {{ $service.replicas }}
  revisionHistoryLimit: 5
  progressDeadlineSeconds: 600
  minReadySeconds: 10
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      {{- include "connectsphere.selectorLabels" $ | nindent 6 }}
      app.kubernetes.io/component: {{ $name }}
  template:
    metadata:
      labels:
        {{- include "connectsphere.selectorLabels" $ | nindent 8 }}
        app.kubernetes.io/component: {{ $name }}
      {{- with $.Values.global.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "connectsphere.serviceAccountName" $ }}
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: {{ default $.Values.global.terminationGracePeriodSeconds $service.terminationGracePeriodSeconds }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              {{- include "connectsphere.selectorLabels" $ | nindent 14 }}
              app.kubernetes.io/component: {{ $name }}
      {{- with $.Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ $name }}
          image: {{ include "connectsphere.image" (dict "root" $ "name" $name "service" $service) | quote }}
          imagePullPolicy: {{ default $.Values.global.image.pullPolicy $service.image.pullPolicy }}
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          ports:
            - name: http
              containerPort: {{ $service.containerPort }}
          envFrom:
            {{- if $.Values.config.create }}
            - configMapRef:
                name: {{ $.Values.config.name }}
            {{- end }}
            - secretRef:
                name: {{ $.Values.secret.name }}
          env:
            {{- range $key, $value := $service.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
            {{- range $key, $secretKey := $service.secretEnv }}
            - name: {{ $key }}
              valueFrom:
                secretKeyRef:
                  name: {{ $.Values.secret.name }}
                  key: {{ $secretKey }}
            {{- end }}
          {{- if $.Values.probes.enabled }}
          startupProbe:
            httpGet:
              path: {{ default (default $.Values.probes.path $service.healthPath) $service.livenessPath }}
              port: http
            periodSeconds: 5
            timeoutSeconds: {{ $.Values.probes.timeoutSeconds }}
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: {{ default (default $.Values.probes.path $service.healthPath) $service.readinessPath }}
              port: http
            initialDelaySeconds: {{ $.Values.probes.initialDelaySeconds }}
            periodSeconds: {{ $.Values.probes.periodSeconds }}
            timeoutSeconds: {{ $.Values.probes.timeoutSeconds }}
            failureThreshold: {{ $.Values.probes.failureThreshold }}
          livenessProbe:
            httpGet:
              path: {{ default (default $.Values.probes.path $service.healthPath) $service.livenessPath }}
              port: http
            initialDelaySeconds: {{ add $.Values.probes.initialDelaySeconds 20 }}
            periodSeconds: {{ $.Values.probes.periodSeconds }}
            timeoutSeconds: {{ $.Values.probes.timeoutSeconds }}
            failureThreshold: {{ $.Values.probes.failureThreshold }}
          {{- end }}
          {{- with $service.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
{{- end }}
{{- end }}
