{{- if .Values.keyVaultSecrets.enabled -}}
---
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: {{ .Values.keyVaultSecrets.name }}
  labels:
    {{- include "connectsphere.labels" . | nindent 4 }}
spec:
  provider: {{ .Values.keyVaultSecrets.provider | quote }}
  {{- if .Values.keyVaultSecrets.syncSecret.enabled }}
  secretObjects:
    - secretName: {{ .Values.keyVaultSecrets.syncSecret.name }}
      type: {{ .Values.keyVaultSecrets.syncSecret.type | quote }}
      data:
        {{- range .Values.keyVaultSecrets.objects }}
        - objectName: {{ .objectName | quote }}
          key: {{ .key | quote }}
        {{- end }}
  {{- end }}
  parameters:
    usePodIdentity: {{ .Values.keyVaultSecrets.usePodIdentity | quote }}
    useVMManagedIdentity: {{ .Values.keyVaultSecrets.useVMManagedIdentity | quote }}
    {{- if .Values.keyVaultSecrets.userAssignedIdentityID }}
    userAssignedIdentityID: {{ .Values.keyVaultSecrets.userAssignedIdentityID | quote }}
    {{- end }}
    keyvaultName: {{ .Values.keyVaultSecrets.keyVaultName | quote }}
    tenantId: {{ .Values.keyVaultSecrets.tenantId | quote }}
    {{- if .Values.keyVaultSecrets.cloudName }}
    cloudName: {{ .Values.keyVaultSecrets.cloudName | quote }}
    {{- end }}
    objects: |
      array:
        {{- range .Values.keyVaultSecrets.objects }}
        - |
          objectName: {{ .objectName }}
          objectType: secret
          {{- if .objectVersion }}
          objectVersion: {{ .objectVersion }}
          {{- end }}
        {{- end }}
{{- if .Values.keyVaultSecrets.syncPod.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-secret-sync
  labels:
    {{- include "connectsphere.labels" . | nindent 4 }}
    app.kubernetes.io/component: secret-sync
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "connectsphere.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: secret-sync
  template:
    metadata:
      labels:
        {{- include "connectsphere.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: secret-sync
    spec:
      serviceAccountName: {{ include "connectsphere.serviceAccountName" . }}
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 65535
        runAsGroup: 65535
        fsGroup: 65535
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: sync
          image: {{ .Values.keyVaultSecrets.syncPod.image | quote }}
          securityContext:
            runAsNonRoot: true
            runAsUser: 65535
            runAsGroup: 65535
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: secrets-store
              mountPath: /mnt/secrets-store
              readOnly: true
      volumes:
        - name: secrets-store
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: {{ .Values.keyVaultSecrets.name | quote }}
{{- end }}
{{- end }}
