{{- range $name, $service := .Values.services }}
{{- $autoscaling := mergeOverwrite (deepCopy $.Values.global.autoscaling) (default dict $service.autoscaling) }}
{{- if and $service.enabled $autoscaling.enabled }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ $.Release.Name }}-{{ $name }}
  labels:
    {{- include "connectsphere.labels" $ | nindent 4 }}
    app.kubernetes.io/component: {{ $name }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ $.Release.Name }}-{{ $name }}
  minReplicas: {{ $autoscaling.minReplicas }}
  maxReplicas: {{ $autoscaling.maxReplicas }}
  behavior:
    scaleUp:
      stabilizationWindowSeconds: {{ $autoscaling.scaleUp.stabilizationWindowSeconds }}
      policies:
        - type: Percent
          value: {{ $autoscaling.scaleUp.maxChangePercent }}
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: {{ $autoscaling.scaleDown.stabilizationWindowSeconds }}
      policies:
        - type: Percent
          value: {{ $autoscaling.scaleDown.maxChangePercent }}
          periodSeconds: 60
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ $autoscaling.targetCPUUtilizationPercentage }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ $autoscaling.targetMemoryUtilizationPercentage }}
{{- end }}
{{- end }}
