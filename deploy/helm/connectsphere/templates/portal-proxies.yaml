{{- if .Values.portalProxies.enabled }}
{{- range $proxy := .Values.portalProxies.items }}
{{- $component := printf "%s-proxy" $proxy.service }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $.Release.Name }}-{{ $proxy.name }}-proxy-caddyfile
  labels:
    {{- include "connectsphere.labels" $ | nindent 4 }}
    app.kubernetes.io/component: {{ $component }}
  annotations:
    argocd.argoproj.io/sync-wave: "0"
data:
  Caddyfile: |
    {
      email {{ $.Values.portalProxies.email }}
    }

    {{ $proxy.host }} {
      encode gzip
      reverse_proxy {{ $proxy.upstream }}
    }
{{- if $.Values.portalProxies.storage.enabled }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ $.Release.Name }}-{{ $proxy.name }}-proxy-caddy-data
  labels:
    {{- include "connectsphere.labels" $ | nindent 4 }}
    app.kubernetes.io/component: {{ $component }}
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  accessModes: ["ReadWriteOnce"]
  {{- if $.Values.portalProxies.storage.storageClassName }}
  storageClassName: {{ $.Values.portalProxies.storage.storageClassName | quote }}
  {{- end }}
  resources:
    requests:
      storage: {{ $.Values.portalProxies.storage.size | quote }}
{{- end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $.Release.Name }}-{{ $proxy.name }}-proxy
  labels:
    {{- include "connectsphere.labels" $ | nindent 4 }}
    app.kubernetes.io/component: {{ $component }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "connectsphere.selectorLabels" $ | nindent 6 }}
      app.kubernetes.io/component: {{ $component }}
  template:
    metadata:
      labels:
        {{- include "connectsphere.selectorLabels" $ | nindent 8 }}
        app.kubernetes.io/component: {{ $component }}
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: caddy
          image: {{ $.Values.portalProxies.image | quote }}
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
              add: ["NET_BIND_SERVICE"]
          ports:
            - { name: http, containerPort: 80 }
            - { name: https, containerPort: 443 }
          readinessProbe:
            tcpSocket: { port: http }
            periodSeconds: 10
          livenessProbe:
            tcpSocket: { port: http }
            periodSeconds: 15
          resources:
            requests: { cpu: 50m, memory: 64Mi }
            limits: { cpu: 250m, memory: 256Mi }
          volumeMounts:
            - name: caddyfile
              mountPath: /etc/caddy/Caddyfile
              subPath: Caddyfile
            - name: caddy-data
              mountPath: /data
            - name: caddy-config
              mountPath: /config
      volumes:
        - name: caddyfile
          configMap:
            name: {{ $.Release.Name }}-{{ $proxy.name }}-proxy-caddyfile
        - name: caddy-data
          {{- if $.Values.portalProxies.storage.enabled }}
          persistentVolumeClaim:
            claimName: {{ $.Release.Name }}-{{ $proxy.name }}-proxy-caddy-data
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: caddy-config
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $.Release.Name }}-{{ $proxy.publicServiceName }}
  labels:
    {{- include "connectsphere.labels" $ | nindent 4 }}
    app.kubernetes.io/component: {{ $proxy.publicServiceName }}
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    {{- with $proxy.serviceAnnotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  type: LoadBalancer
  selector:
    {{- include "connectsphere.selectorLabels" $ | nindent 4 }}
    app.kubernetes.io/component: {{ $component }}
  ports:
    - { name: http, port: 80, targetPort: 80 }
    - { name: https, port: 443, targetPort: 443 }
{{- end }}
{{- end }}
