global:
  image:
    registry: example.azurecr.io
    repositoryPrefix: connectsphere
    tag: v1.0.0
    pullPolicy: Always

config:
  create: true
  name: connectsphere-config
  data:
    NODE_ENV: production
    APP_ENV: production
    RELEASE_VERSION: v1.0.0
    ENABLE_BACKGROUND_WORKERS: "true"
    FEATURE_COMMERCE: "false"
    FEATURE_AI_FAQ: "false"
    FEATURE_META_ADS: "false"
    FEATURE_PETPOOJA: "false"
    FEATURE_ADVANCED_ANSWERBOT: "false"
    FEATURE_DEVELOPER_API: "false"
    FEATURE_FORMS: "false"
    NEXT_PUBLIC_FEATURE_COMMERCE: "false"
    NEXT_PUBLIC_FEATURE_AI_FAQ: "false"
    NEXT_PUBLIC_FEATURE_META_ADS: "false"
    NEXT_PUBLIC_FEATURE_PETPOOJA: "false"
    NEXT_PUBLIC_FEATURE_ADVANCED_ANSWERBOT: "false"
    NEXT_PUBLIC_FEATURE_DEVELOPER_API: "false"
    NEXT_PUBLIC_FEATURE_FORMS: "false"
    ALLOWED_ORIGINS: https://connectsphere-customer-vivek.eastus.cloudapp.azure.com,https://connectsphere-admin-vivek.eastus.cloudapp.azure.com,https://connectsphere-career-vivek.eastus.cloudapp.azure.com
    NEXT_PUBLIC_APP_NAME: ConnectSphere
    NEXT_PUBLIC_APP_URL: https://connectsphere-customer-vivek.eastus.cloudapp.azure.com
    NEXT_PUBLIC_API_URL: /api
    NEXT_PUBLIC_SOCKET_URL: https://connectsphere-api-vivek.eastus.cloudapp.azure.com
    CUSTOMER_PORTAL_URL: https://connectsphere-customer-vivek.eastus.cloudapp.azure.com
    CUSTOMER_PORTAL_HEALTH_URL: http://connectsphere-customer-portal:3000
    ADMIN_PORTAL_URL: https://connectsphere-admin-vivek.eastus.cloudapp.azure.com
    CAREER_PORTAL_URL: https://connectsphere-career-vivek.eastus.cloudapp.azure.com
    CAREER_PORTAL_HEALTH_URL: http://connectsphere-career-portal:3001/api/health/live
    GOOGLE_AUTH_ENABLED: "true"
    NEXT_PUBLIC_GOOGLE_AUTH_ENABLED: "true"
    NEXT_PUBLIC_FACEBOOK_AUTH_ENABLED: "false"
    ALLOW_DEV_AUTH_MOCKS: "false"
    ALLOW_DEV_MEDIA_MOCKS: "false"
    ALLOW_UNSIGNED_DEV_WEBHOOKS: "false"
    ALLOW_UNSIGNED_DEV_PAYMENT_WEBHOOKS: "false"
    REQUIRE_WEBHOOK_SIGNATURE: "true"
    # Keep payment operations fail-closed until all three Key Vault secrets are
    # present: razorpay-key-id, razorpay-key-secret, and razorpay-webhook-secret.
    RAZORPAY_ENABLED: "false"
    GATEWAY_URL: http://connectsphere-api-gateway:5001
    API_GATEWAY_URL: http://connectsphere-api-gateway:5001
    AUTH_SERVICE_URL: http://connectsphere-auth-service:3006
    CONTACT_SERVICE_URL: http://connectsphere-contact-service:3007
    CHAT_SERVICE_URL: http://connectsphere-chat-service:3008
    SERVICE_PROVIDER_URL: http://connectsphere-service-provider:3004
    BSP_SERVICE_URL: http://connectsphere-service-provider:3004
    AUTOMATION_SERVICE_URL: http://connectsphere-automation-service:3001
    BILLING_SERVICE_URL: http://connectsphere-billing-service:3003
    CAMPAIGN_SERVICE_URL: http://connectsphere-campaign-service:3002
    WEBSOCKET_URL: http://connectsphere-websocket-gateway:3009
    WEBHOOK_INGESTOR_URL: http://connectsphere-webhook-ingestor:3013

secret:
  create: false
  name: connectsphere-secrets

keyVaultSecrets:
  enabled: true
  syncPod:
    enabled: true
    image: registry.k8s.io/pause:3.10
  keyVaultName: connectsphere-prod-kv
  tenantId: 21006d98-d493-4e9b-bdd6-6f128e1ee540
  userAssignedIdentityID: 99cc93b9-291d-442a-936d-a637a84c8b8c
  objects:
    # Shared platform secrets. They have one value per environment and are
    # injected only into the workloads listed in services.*.secretEnv.
    - key: JWT_SECRET
      objectName: jwt-secret
    - key: INTERNAL_SERVICE_SECRET
      objectName: internal-service-secret
    - key: INTEGRATION_ENCRYPTION_KEY
      objectName: integration-encryption-key
    - key: REDIS_URL
      objectName: redis-url

    # Service-owned secrets. Use a distinct Key Vault secret for each service
    # database and external provider integration.
    - key: GUPSHUP_PARTNER_CLIENT_SECRET
      objectName: gupshup-partner-client-secret
    - key: GUPSHUP_PARTNER_EMAIL
      objectName: gupshup-partner-email
    - key: GUPSHUP_PARTNER_PASSWORD
      objectName: gupshup-partner-password
    - key: BETTER_AUTH_SECRET
      objectName: better-auth-secret
    - key: GOOGLE_CLIENT_ID
      objectName: google-client-id
    - key: GOOGLE_CLIENT_SECRET
      objectName: google-client-secret
    - key: ADMIN_GOOGLE_SIGNUP_EMAILS
      objectName: admin-google-signup-emails
    - key: SMTP_HOST
      objectName: smtp-host
    - key: SMTP_USER
      objectName: smtp-user
    - key: SMTP_PASSWORD
      objectName: smtp-password
    - key: SMTP_FROM
      objectName: auth-smtp-from
    - key: EMAIL_REPLY_TO
      objectName: email-reply-to
    - key: RAZORPAY_KEY_ID
      objectName: razorpay-key-id
    - key: RAZORPAY_KEY_SECRET
      objectName: razorpay-key-secret
    - key: RAZORPAY_WEBHOOK_SECRET
      objectName: razorpay-webhook-secret
    - key: MONGODB_URI
      objectName: mongodb-uri
    - key: MONGODB_URI_AUTOMATION
      objectName: mongodb-uri-automation
    - key: MONGODB_URI_BILLING
      objectName: mongodb-uri-billing
    - key: MONGODB_URI_CAMPAIGN
      objectName: mongodb-uri-campaign
    - key: MONGO_URI_AUTH
      objectName: mongo-uri-auth
    - key: MONGO_URI_AUTOMATION
      objectName: mongo-uri-automation
    - key: MONGO_URI_BILLING
      objectName: mongo-uri-billing
    - key: MONGO_URI_BSP
      objectName: mongo-uri-bsp
    - key: MONGO_URI_CAMPAIGN
      objectName: mongo-uri-campaign
    - key: MONGO_URI_CHAT
      objectName: mongo-uri-chat
    - key: MONGO_URI_CONTACT
      objectName: mongo-uri-contact
    - key: MONGO_URI_WEBHOOK
      objectName: mongo-uri-webhook
    - key: MONGO_URI_WEBSOCKET
      objectName: mongo-uri-websocket
    - key: VERIFY_TOKEN
      objectName: verify-token
    - key: WEBHOOK_SECRET
      objectName: webhook-secret
    - key: WEBHOOK_VERIFY_TOKEN
      objectName: webhook-verify-token
    - key: WHATSAPP_WEBHOOK_VERIFY_TOKEN
      objectName: whatsapp-webhook-verify-token

services:
  api-gateway:
    env:
      ALLOWED_ORIGINS: https://connectsphere-customer-vivek.eastus.cloudapp.azure.com,https://connectsphere-admin-vivek.eastus.cloudapp.azure.com,https://connectsphere-career-vivek.eastus.cloudapp.azure.com
    autoscaling:
      enabled: true
      minReplicas: 2
      maxReplicas: 10
    pdb:
      enabled: true
      minAvailable: 1
  auth-service:
    secretEnv:
      MONGO_URI: MONGO_URI_AUTH
      JWT_SECRET: JWT_SECRET
      INTERNAL_SERVICE_SECRET: INTERNAL_SERVICE_SECRET
      REDIS_URL: REDIS_URL
      SMTP_HOST: SMTP_HOST
      SMTP_USER: SMTP_USER
      SMTP_PASS: SMTP_PASSWORD
      SMTP_FROM: SMTP_FROM
      GOOGLE_CLIENT_ID: GOOGLE_CLIENT_ID
      GOOGLE_CLIENT_SECRET: GOOGLE_CLIENT_SECRET
    autoscaling:
      enabled: true
      minReplicas: 2
      maxReplicas: 6
    pdb:
      enabled: true
      minAvailable: 1
  campaign-service:
    secretEnv:
      MONGO_URI: MONGO_URI_CAMPAIGN
      JWT_SECRET: JWT_SECRET
      INTERNAL_SERVICE_SECRET: INTERNAL_SERVICE_SECRET
      REDIS_URL: REDIS_URL
  billing-service:
    secretEnv:
      MONGO_URI: MONGO_URI_BILLING
      JWT_SECRET: JWT_SECRET
      INTERNAL_SERVICE_SECRET: INTERNAL_SERVICE_SECRET
      REDIS_URL: REDIS_URL
      RAZORPAY_KEY_ID: RAZORPAY_KEY_ID
      RAZORPAY_KEY_SECRET: RAZORPAY_KEY_SECRET
      RAZORPAY_WEBHOOK_SECRET: RAZORPAY_WEBHOOK_SECRET
  service-provider:
    env:
      WHATSAPP_WEBHOOK_URL: https://connectsphere-api-vivek.eastus.cloudapp.azure.com/api/webhooks/whatsapp
    secretEnv:
      MONGO_URI: MONGO_URI_BSP
      JWT_SECRET: JWT_SECRET
      INTERNAL_SERVICE_SECRET: INTERNAL_SERVICE_SECRET
      INTEGRATION_ENCRYPTION_KEY: INTEGRATION_ENCRYPTION_KEY
      REDIS_URL: REDIS_URL
      GUPSHUP_PARTNER_CLIENT_SECRET: GUPSHUP_PARTNER_CLIENT_SECRET
      GUPSHUP_PARTNER_EMAIL: GUPSHUP_PARTNER_EMAIL
      GUPSHUP_PARTNER_PASSWORD: GUPSHUP_PARTNER_PASSWORD
      WEBHOOK_SECRET: WEBHOOK_SECRET
      WHATSAPP_WEBHOOK_VERIFY_TOKEN: WHATSAPP_WEBHOOK_VERIFY_TOKEN
  automation-service:
    secretEnv:
      MONGO_URI: MONGO_URI_AUTOMATION
      JWT_SECRET: JWT_SECRET
      INTERNAL_SERVICE_SECRET: INTERNAL_SERVICE_SECRET
      INTEGRATION_ENCRYPTION_KEY: INTEGRATION_ENCRYPTION_KEY
      REDIS_URL: REDIS_URL
  chat-service:
    secretEnv:
      MONGO_URI: MONGO_URI_CHAT
      JWT_SECRET: JWT_SECRET
      INTERNAL_SERVICE_SECRET: INTERNAL_SERVICE_SECRET
      REDIS_URL: REDIS_URL
    autoscaling:
      enabled: true
      minReplicas: 2
      maxReplicas: 10
    pdb:
      enabled: true
      minAvailable: 1
  contact-service:
    secretEnv:
      MONGO_URI: MONGO_URI_CONTACT
      JWT_SECRET: JWT_SECRET
      INTERNAL_SERVICE_SECRET: INTERNAL_SERVICE_SECRET
      REDIS_URL: REDIS_URL
  webhook-ingestor:
    secretEnv:
      MONGO_URI: MONGO_URI_WEBHOOK
      INTERNAL_SERVICE_SECRET: INTERNAL_SERVICE_SECRET
      REDIS_URL: REDIS_URL
      WEBHOOK_SECRET: WEBHOOK_SECRET
      VERIFY_TOKEN: VERIFY_TOKEN
    autoscaling:
      enabled: true
      minReplicas: 2
      maxReplicas: 10
    pdb:
      enabled: true
      minAvailable: 1
  websocket-gateway:
    env:
      ALLOWED_ORIGINS: https://connectsphere-customer-vivek.eastus.cloudapp.azure.com,https://connectsphere-admin-vivek.eastus.cloudapp.azure.com,https://connectsphere-career-vivek.eastus.cloudapp.azure.com
    secretEnv:
      MONGO_URI: MONGO_URI_WEBSOCKET
      JWT_SECRET: JWT_SECRET
      REDIS_URL: REDIS_URL
    autoscaling:
      enabled: true
      minReplicas: 2
      maxReplicas: 10
    pdb:
      enabled: true
      minAvailable: 1
  admin-portal:
    env:
      WHATSAPP_WEBHOOK_URL: https://connectsphere-api-vivek.eastus.cloudapp.azure.com/api/webhooks/whatsapp
      ADMIN_PORTAL_URL: https://connectsphere-admin-vivek.eastus.cloudapp.azure.com
      NEXT_PUBLIC_APP_URL: https://connectsphere-admin-vivek.eastus.cloudapp.azure.com
      NEXT_PUBLIC_GOOGLE_AUTH_ENABLED: "true"
    secretEnv:
      MONGODB_URI: MONGODB_URI
      MONGODB_URI_BILLING: MONGODB_URI_BILLING
      MONGODB_URI_CAMPAIGN: MONGODB_URI_CAMPAIGN
      MONGODB_URI_AUTOMATION: MONGODB_URI_AUTOMATION
      MONGODB_URI_BSP: MONGO_URI_BSP
      GUPSHUP_PARTNER_CLIENT_SECRET: GUPSHUP_PARTNER_CLIENT_SECRET
      GUPSHUP_PARTNER_EMAIL: GUPSHUP_PARTNER_EMAIL
      GUPSHUP_PARTNER_PASSWORD: GUPSHUP_PARTNER_PASSWORD
  career-portal:
    env:
      APP_URL: https://connectsphere-career-vivek.eastus.cloudapp.azure.com
      BETTER_AUTH_URL: https://connectsphere-career-vivek.eastus.cloudapp.azure.com
      NEXT_PUBLIC_GOOGLE_AUTH_ENABLED: "true"
      REQUIRE_PRIVILEGED_MFA: "true"
      SMTP_PORT: "587"
      SMTP_SECURE: "false"
    secretEnv:
      MONGODB_URI: MONGODB_URI
      BETTER_AUTH_SECRET: BETTER_AUTH_SECRET
      GOOGLE_CLIENT_ID: GOOGLE_CLIENT_ID
      GOOGLE_CLIENT_SECRET: GOOGLE_CLIENT_SECRET
      SMTP_HOST: SMTP_HOST
      SMTP_USER: SMTP_USER
      SMTP_PASSWORD: SMTP_PASSWORD
      EMAIL_REPLY_TO: EMAIL_REPLY_TO

ingress:
  # Public DNS points directly to Azure LoadBalancer services and the Caddy
  # proxies. Do not render an nginx Ingress when no nginx controller exists.
  enabled: false
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-production
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "10"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    nginx.ingress.kubernetes.io/limit-rps: "30"
    nginx.ingress.kubernetes.io/limit-burst-multiplier: "3"
  tls:
    - secretName: connectsphere-public-tls
      hosts:
        - connectsphere-customer-vivek.eastus.cloudapp.azure.com
        - connectsphere-admin-vivek.eastus.cloudapp.azure.com
        - connectsphere-career-vivek.eastus.cloudapp.azure.com
  hosts:
    - host: connectsphere-customer-vivek.eastus.cloudapp.azure.com
      service: customer-portal
      path: /
      pathType: Prefix
    - host: connectsphere-admin-vivek.eastus.cloudapp.azure.com
      service: admin-portal
      path: /
      pathType: Prefix
    - host: connectsphere-career-vivek.eastus.cloudapp.azure.com
      service: career-portal
      path: /
      pathType: Prefix

networkPolicy:
  # Enable only after confirming this namespace label exists on the cluster's
  # ingress controller namespace. This avoids locking out public traffic.
  enabled: false
  ingressControllerNamespaceLabel: kubernetes.io/metadata.name
  ingressControllerNamespace: ingress-nginx

publicServices:
  enabled: false
  items:
    - name: career-portal-public
      service: career-portal
      port: 80
      targetPort: 3001
      annotations:
        service.beta.kubernetes.io/azure-dns-label-name: connectsphere-career-vivek

portalProxies:
  enabled: true
  email: vivekkumarprince1@gmail.com
  image: caddy:2.9-alpine
  storage:
    enabled: true
    size: 1Gi
  items:
    - name: customer
      service: customer-portal
      publicServiceName: customer-portal-public
      host: connectsphere-customer-vivek.eastus.cloudapp.azure.com
      upstream: connectsphere-customer-portal:3000
      serviceAnnotations:
        service.beta.kubernetes.io/azure-dns-label-name: connectsphere-customer-vivek
    - name: admin
      service: admin-portal
      publicServiceName: admin-portal-public
      host: connectsphere-admin-vivek.eastus.cloudapp.azure.com
      upstream: connectsphere-admin-portal:3100
      serviceAnnotations:
        service.beta.kubernetes.io/azure-dns-label-name: connectsphere-admin-vivek

careerPortalProxy:
  enabled: true
  host: connectsphere-career-vivek.eastus.cloudapp.azure.com
  email: vivekkumarprince1@gmail.com
  image: caddy:2.9-alpine
  upstream: connectsphere-career-portal:3001
  storage:
    enabled: true
    size: 1Gi
  service:
    annotations:
      service.beta.kubernetes.io/azure-dns-label-name: connectsphere-career-vivek

apiGatewayProxy:
  enabled: true
  host: connectsphere-api-vivek.eastus.cloudapp.azure.com
  email: vivekkumarprince1@gmail.com
  image: caddy:2.9-alpine
  upstream: connectsphere-api-gateway:5001
  storage:
    enabled: true
    size: 1Gi
  service:
    annotations:
      service.beta.kubernetes.io/azure-dns-label-name: connectsphere-api-vivek
